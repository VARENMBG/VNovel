<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Archeon Novel</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<header>
  <h1>Archeon</h1>
  <div id="userBox"></div>
</header>

<section class="auth-box">
  <input type="text" id="username" placeholder="Username">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <div class="btn-group">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>
</section>

<section class="add-novel">
  <h2>Tambah Novel</h2>
  <input type="text" id="novelTitle" placeholder="Judul Novel">
  <textarea id="novelDesc" placeholder="Deskripsi Novel"></textarea>
  <input type="file" id="coverFile">
  <button onclick="addNovel()">Tambah Novel</button>
</section>

<section>
  <h2>Daftar Novel</h2>
  <div id="novelList" class="novel-list"></div>
</section>

<section class="chapter-box">
  <h2>Tambah Chapter</h2>
  <input type="text" id="chapterTitle" placeholder="Judul Chapter">
  <textarea id="chapterContent" placeholder="Isi Chapter"></textarea>
  <button onclick="addChapter()">Tambah Chapter</button>
</section>

<section>
  <h2>Chapter</h2>
  <div id="chapterList"></div>
</section>

<section class="comment-box">
  <h2>Komentar</h2>
  <textarea id="commentText" placeholder="Tulis komentar..."></textarea>
  <button onclick="addComment()">Kirim Komentar</button>
  <div id="commentList"></div>
</section>

<script src="app.js"></script>
</body>
</html>
