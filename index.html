<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VNovel - Archeon: The End Before Beginning</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            color: #2c3e50;
            transition: all 0.3s;
        }

        body.dark {
            background: #1a1a2e;
            color: #e0e0e0;
        }

        body.dark .card, body.dark .chapter-card, body.dark .reading-box, body.dark .detail-card {
            background: #16213e;
            color: #e0e0e0;
            border-color: #2a2a4a;
        }

        /* Header */
        .header {
            background: white;
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #b87c4f;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 1rem;
        }

        body.dark .header {
            background: #0f0f1a;
        }

        .logo h1 {
            color: #b87c4f;
            font-size: 1.5rem;
        }

        .right-area {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            background: #b87c4f;
            border: none;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page {
            display: none;
            animation: fadeIn 0.3s;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Grid Novel */
        .novel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #e0e0e0;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-color: #b87c4f;
        }

        .card-cover {
            width: 100%;
            aspect-ratio: 2 / 3;
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            padding: 0.8rem;
        }

        .card-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #b87c4f;
            margin-bottom: 0.2rem;
        }

        .card-desc {
            font-size: 0.7rem;
            opacity: 0.7;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Detail Novel */
        .detail-card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e0e0e0;
        }

        .detail-header {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .detail-cover {
            width: 180px;
            aspect-ratio: 2 / 3;
            background: #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
        }

        .detail-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-info {
            flex: 1;
        }

        .detail-title {
            font-size: 1.8rem;
            color: #b87c4f;
            margin-bottom: 0.5rem;
        }

        .detail-author {
            color: #666;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .detail-stats {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }

        .detail-desc {
            line-height: 1.6;
            font-size: 0.9rem;
        }

        /* Chapter Grid */
        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.7rem;
            margin-top: 1rem;
        }

        .chapter-card {
            background: white;
            border-radius: 8px;
            padding: 0.6rem;
            cursor: pointer;
            text-align: center;
            border: 1px solid #e0e0e0;
            transition: 0.2s;
        }

        .chapter-card:hover {
            border-color: #b87c4f;
            background: #faf7f2;
            transform: translateY(-2px);
        }

        body.dark .chapter-card:hover {
            background: #2a2a4a;
        }

        .chapter-num {
            color: #b87c4f;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .chapter-title {
            font-size: 0.7rem;
            margin-top: 0.2rem;
        }

        /* Reading Page */
        .reading-box {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
        }

        .reading-title {
            font-size: 1.3rem;
            color: #b87c4f;
            border-left: 3px solid #b87c4f;
            padding-left: 0.8rem;
            margin-bottom: 1rem;
        }

        .reading-text p {
            margin-bottom: 0.8rem;
            text-indent: 1.5em;
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .nav-chapter {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            gap: 0.5rem;
        }

        .nav-chapter button {
            background: #b87c4f;
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            cursor: pointer;
            flex: 1;
            font-size: 0.8rem;
        }

        .nav-chapter button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .back-btn {
            background: #b87c4f;
            border: none;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 25px;
            cursor: pointer;
            margin-bottom: 1rem;
            font-size: 0.8rem;
        }

        .footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid #ddd;
            font-size: 0.7rem;
            margin-top: 2rem;
        }

        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .novel-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
            .detail-header { flex-direction: column; align-items: center; text-align: center; }
            .detail-cover { width: 140px; }
            .detail-title { font-size: 1.3rem; }
            .chapter-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <h1>📚 VNOVEL</h1>
    </div>
    <div class="right-area">
        <button class="btn-icon" id="darkModeBtn">🌙</button>
    </div>
</div>

<div class="container">
    <!-- Halaman Utama -->
    <div id="homePage" class="page active">
        <div class="novel-grid" id="novelGrid"></div>
    </div>

    <!-- Halaman Detail -->
    <div id="detailPage" class="page">
        <button class="back-btn" id="backHomeBtn">← Kembali ke Beranda</button>
        <div id="detailContainer"></div>
        <h3 style="color:#b87c4f; margin: 1rem 0 0.5rem;">📖 Daftar Bab</h3>
        <div id="chapterList" class="chapter-grid"></div>
    </div>

    <!-- Halaman Baca -->
    <div id="readPage" class="page">
        <button class="back-btn" id="backDetailBtn">← Kembali ke Detail</button>
        <div id="readingContainer"></div>
    </div>
</div>

<div class="footer">
    © 2026 VNovel — Archeon: The End Before Beginning
</div>

<script>
    // ==================== DATA NOVEL ====================
    let currentNovel = null;
    let currentChapter = null;

    const judulBab = [
        "Anak yang Lahir dalam Keheningan", "Hari yang Tidak Memilihnya", "Yang Dibuang Oleh Cahaya",
        "Langkah Pertama di Luar Cahaya", "Kota di Ujung Hutan", "Nama yang Dicari Kegelapan",
        "Nama yang Bukan Miliknya", "Jejak yang Mulai Terbuka", "Reruntuhan yang Mengenalnya",
        "Pintu Kedua", "Runtuhan yang Memilih", "Suara dari Dalam Diri",
        "Cahaya yang Tetap Tinggal", "Luka Pertama", "Simbol Kedua",
        "Nama yang Dibisikkan", "Kota yang Menolak", "Pedang Tanpa Mana",
        "Malam Berdarah Astera", "Nama yang Mulai Bangkit", "Setelah Nama Itu Bangkit",
        "Mata di Dalam Bayangan", "Jalan ke Timur", "Kota Abu yang Sunyi", "Desa yang Mengingat"
    ];

    const isiCerita = `Malam itu desa Elaris diselimuti kabut lebih tebal dari biasanya. Tidak ada hujan. Tidak ada angin. Tidak ada suara malam. Bahkan hutan di sekitar desa terasa diam, seolah seluruh dunia sedang menunggu sesuatu. Di sebuah rumah kayu sederhana di pinggir desa, seorang bayi laki-laki akhirnya lahir. Tangisannya kecil. Pelan. Hampir tidak terdengar. Ibunya, Elena, memeluk bayi itu dengan napas lelah. Di sampingnya, ayahnya, Daren, menatap dengan wajah tegang. Seperti tradisi desa, tabib tua bernama Sera meletakkan tangannya di dada bayi itu untuk merasakan aliran mana pertama. Setiap anak yang lahir di Elaris selalu membawa mana. Sedikit ataupun besar. Namun saat Sera menutup mata, wajahnya perlahan berubah. Ia membuka mata pelan. Lalu menatap bayi itu sekali lagi. <strong>Tidak ada.</strong> Tidak ada mana. Sama sekali. <br><br>Cerita berlanjut...`;

    const novel = {
        id: 1,
        title: "Archeon: The End Before Beginning",
        author: "Muhammad Alfarel Hafizh",
        views: "125.5K",
        chapters: 25,
        description: "Seorang anak yang lahir tanpa mana, tapi menyimpan kekuatan yang bahkan para dewa takut membangunkannya. Di desa Elaris, setiap anak yang lahir membawa mana — kecuali satu. Archeon lahir dalam keheningan, tanpa jejak sihir sedikit pun. Kosong. Tapi kehampaan itu mulai mengguncang dunia ketika Crystal of Origin, penjaga keseimbangan selama ribuan tahun, mulai retak tanpa suara.",
        image: "archeonn.jpg",
        chaptersList: []
    };

    // Generate 25 chapter
    for (let i = 0; i < 25; i++) {
        novel.chaptersList.push({
            id: i + 1,
            title: judulBab[i],
            content: `<p>${isiCerita}</p><p><em>— Bab ${i+1} selesai —</em></p>`
        });
    }

    // ==================== RENDER ====================
    function renderHome() {
        const grid = document.getElementById('novelGrid');
        grid.innerHTML = `
            <div class="card" onclick="openDetail()">
                <div class="card-cover">
                    <img src="${novel.image}" onerror="this.src='https://placehold.co/300x450/2a2a2a/b87c4f?text=Archeon'">
                </div>
                <div class="card-info">
                    <div class="card-title">${novel.title}</div>
                    <div class="card-desc">${novel.description.substring(0, 60)}...</div>
                </div>
            </div>
        `;
    }

    window.openDetail = function() {
        currentNovel = novel;
        
        document.getElementById('detailContainer').innerHTML = `
            <div class="detail-card">
                <div class="detail-header">
                    <div class="detail-cover">
                        <img src="${novel.image}" onerror="this.src='https://placehold.co/300x450/2a2a2a/b87c4f?text=Archeon'">
                    </div>
                    <div class="detail-info">
                        <div class="detail-title">${novel.title}</div>
                        <div class="detail-author">✍️ ${novel.author}</div>
                        <div class="detail-stats">
                            <span>📖 ${novel.chapters} Bab</span>
                            <span>👁️ ${novel.views} dilihat</span>
                        </div>
                        <div class="detail-desc">${novel.description}</div>
                    </div>
                </div>
            </div>
        `;
        
        renderChapterList();
        showPage('detailPage');
    }

    function renderChapterList() {
        const container = document.getElementById('chapterList');
        container.innerHTML = novel.chaptersList.map(ch => `
            <div class="chapter-card" onclick="openChapter(${ch.id})">
                <div class="chapter-num">Bab ${ch.id}</div>
                <div class="chapter-title">${ch.title}</div>
            </div>
        `).join('');
    }

    window.openChapter = function(chapterId) {
        currentChapter = novel.chaptersList.find(ch => ch.id === chapterId);
        if (!currentChapter) return;
        
        const currentIdx = novel.chaptersList.findIndex(ch => ch.id === chapterId);
        const prevChapter = currentIdx > 0 ? novel.chaptersList[currentIdx - 1] : null;
        const nextChapter = currentIdx < novel.chaptersList.length - 1 ? novel.chaptersList[currentIdx + 1] : null;
        
        document.getElementById('readingContainer').innerHTML = `
            <div class="reading-box">
                <div class="reading-title">Bab ${currentChapter.id} — ${currentChapter.title}</div>
                <div class="reading-text">${currentChapter.content}</div>
                <div class="nav-chapter">
                    <button id="prevBtn" ${!prevChapter ? 'disabled' : ''}>← Bab Sebelumnya</button>
                    <button id="nextBtn" ${!nextChapter ? 'disabled' : ''}>Bab Selanjutnya →</button>
                </div>
            </div>
        `;
        
        document.getElementById('prevBtn')?.onclick = () => { if (prevChapter) openChapter(prevChapter.id); };
        document.getElementById('nextBtn')?.onclick = () => { if (nextChapter) openChapter(nextChapter.id); };
        
        showPage('readPage');
    }

    // ==================== NAVIGASI ====================
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    // ==================== DARK MODE ====================
    function initDarkMode() {
        const dark = localStorage.getItem('dark') === 'true';
        if (dark) document.body.classList.add('dark');
        const btn = document.getElementById('darkModeBtn');
        btn.textContent = dark ? '☀️' : '🌙';
        btn.onclick = () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('dark', isDark);
            btn.textContent = isDark ? '☀️' : '🌙';
        };
    }

    // ==================== INIT ====================
    function init() {
        renderHome();
        initDarkMode();
        
        document.getElementById('backHomeBtn').onclick = () => showPage('homePage');
        document.getElementById('backDetailBtn').onclick = () => showPage('detailPage');
    }
    
    init();
</script>
</body>
</html>
