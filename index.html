    const komikData = [
        {
            id: 1,
            title: "Archeon: The End Before Beginning",
            description: "Seorang anak yang lahir tanpa mana, tapi menyimpan kekuatan yang bahkan para dewa takut membangunkannya.",
            image: "archeon.jpg",
            chapters: [
                { id: 1, title: "Anak yang Lahir dalam Keheningan", content: "<p>Malam itu desa Elaris diselimuti kabut lebih tebal dari biasanya. Tidak ada hujan. Tidak ada angin. Tidak ada suara malam. Bahkan hutan di sekitar desa terasa diam, seolah seluruh dunia sedang menunggu sesuatu. Di sebuah rumah kayu sederhana di pinggir desa, seorang bayi laki-laki akhirnya lahir. Tangisannya kecil. Pelan. Hampir tidak terdengar. Ibunya, Elena, memeluk bayi itu dengan napas lelah. Di sampingnya, ayahnya, Daren, menatap dengan wajah tegang. Seperti tradisi desa, tabib tua bernama Sera meletakkan tangannya di dada bayi itu untuk merasakan aliran mana pertama. Setiap anak yang lahir di Elaris selalu membawa mana. Sedikit ataupun besar. Namun saat Sera menutup mata, wajahnya perlahan berubah. Ia membuka mata pelan. Lalu menatap bayi itu sekali lagi. <strong>Tidak ada.</strong> Tidak ada mana. Sama sekali. <em>— Bab 1 selesai —</em></p>" },
                { id: 2, title: "Hari yang Tidak Memilihnya", content: "<p>Tahun-tahun berlalu dengan cepat. Anak kecil yang dulu selalu duduk sendirian di bawah pohon kini telah tumbuh menjadi seorang remaja berusia tujuh belas tahun. Archeon berdiri lebih tinggi sekarang. Rambut hitamnya sedikit panjang. Tatapannya tenang. Namun satu hal tidak pernah berubah. Ia tetap tidak memiliki mana. Pagi itu, Archeon duduk di atas bukit kecil di belakang desa. Dari sana, ia bisa melihat seluruh Elaris. Lyria duduk di sampingnya. 'Kau kabur lagi ke sini.' 'Aku cuma ingin tenang.' Lyria tersenyum kecil. 'Berarti kau gugup.' Hari itu adalah Hari Pengukuran. <em>— Bab 2 selesai —</em></p>" },
                { id: 3, title: "Yang Dibuang Oleh Cahaya", content: "<p>Keheningan menyelimuti alun-alun desa. Setelah tangan Archeon terlepas dari Crystal of Origin, tak ada satu pun cahaya yang muncul. 'Kosong...' 'Benar-benar tidak punya mana...' 'Bahkan kristal menolaknya...' Ketua Rowan melangkah maju. 'Anak tanpa mana tidak bisa hidup di bawah perlindungan desa ini. Mulai hari ini, Archeon diasingkan dari desa.' Lyria melangkah maju. 'Kalau dia pergi... aku ikut.' Rhen, Mira, Kaien, dan Selene juga ikut. <em>— Bab 3 selesai —</em></p>" },
                { id: 4, title: "Langkah Pertama di Luar Cahaya", content: "<p>Malam pertama di luar desa terasa jauh lebih sunyi. Tidak ada suara lonceng malam. Tidak ada cahaya rumah. Yang ada hanya hutan gelap, angin dingin. Archeon duduk di dekat api kecil tanpa banyak bicara. Lyria duduk di sampingnya. 'Kau masih memikirkannya?' Archeon menatap api. 'Aku tidak tahu kenapa aku bisa mendengar suara itu.' Selene menatap gelapnya hutan. 'Besok... kita tidak sendirian.' <em>— Bab 4 selesai —</em></p>" },
                { id: 5, title: "Kota di Ujung Hutan", content: "<p>Jalan batu tua itu membawa mereka keluar dari hutan. Di kejauhan, berdiri sebuah kota kecil dengan tembok batu rendah dan gerbang kayu besar. Di atas gerbang tertulis: Astera. Mira langsung tersenyum lebar. 'Akhirnya kita sampai!' Kaien hampir terlihat terharu. 'Aku mau makanan hangat. Sekarang.' Hanya Archeon yang diam. Ia menatap kota itu cukup lama. Lyria memperhatikan wajahnya. 'Kau baik?' 'Hanya terasa aneh.' <em>— Bab 5 selesai —</em></p>" },
                { id: 6, title: "Nama yang Dicari Kegelapan", content: "<p>Archeon terbangun dengan napas tertahan. Ia langsung bangkit dari tempat tidur dan menatap ke luar. Jalanan kota Astera sunyi. Pria berjubah abu-abu itu sudah menghilang. 'Kau tidak tidur?' Lyria sudah duduk di tepi ranjang. 'Ada apa?' Archeon menatap jendela. 'Dia ada di luar tadi.' Lyria berjalan mendekat. 'Kenapa dia cuma melihat?' 'Itu yang membuatku khawatir.' <em>— Bab 6 selesai —</em></p>" },
                { id: 7, title: "Nama yang Bukan Miliknya", content: "<p>Suasana di dalam penginapan membeku. 'Origin.' Archeon menatap pria berjubah abu-abu itu. Rhen mengangkat pedangnya. 'Kau salah orang.' Pria itu menjawab, 'Aku tidak pernah salah.' Lyria berdiri lebih dekat. 'Kau siapa?' 'Seorang penjaga.' Pria itu menatap Archeon. 'Segel.' Archeon menatap telapak tangannya. Simbol lingkaran retak itu masih terlihat samar. <em>— Bab 7 selesai —</em></p>" },
                { id: 8, title: "Jejak yang Mulai Terbuka", content: "<p>Pagi di Astera terasa berbeda. Archeon berdiri di dekat jendela, menatap telapak tangannya. Simbol lingkaran retak itu masih ada. Lyria masuk. 'Kau belum tidur semalam?' Archeon bertanya, 'Kalau suatu hari aku berubah... apa kau masih percaya padaku?' Lyria menjawab tanpa ragu. 'Aku tidak pernah percaya pada kekuatanmu. Aku percaya padamu.' <em>— Bab 8 selesai —</em></p>" },
                { id: 9, title: "Reruntuhan yang Mengenalnya", content: "<p>Pecahan Stone Hollow masih berserakan di tanah. 'Kau... bagaimana bisa tahu titik lemahnya?' Archeon masih melihat tangannya sendiri. 'Aku tidak tahu.' Lyria berjalan mendekat, lalu memegang tangannya. 'Kita belum selesai.' Di depan mereka, pintu batu besar yang sebelumnya tertutup rapat kini terbuka perlahan. <em>— Bab 9 selesai —</em></p>" },
                { id: 10, title: "Pintu Kedua", content: "<p>Suara batu bergeser memenuhi lorong. Pintu kedua perlahan terbuka. Di tengah ruangan, berdiri sebuah altar hitam yang dipenuhi retakan bercahaya merah. Di atas altar, melayang sebuah pecahan kristal kecil yang sangat mirip dengan Crystal of Origin. Namun warnanya hitam. Archeon berjalan perlahan mendekat. <em>— Bab 10 selesai —</em></p>" },
                { id: 11, title: "Runtuhan yang Memilih", content: "<p>Suara retakan memenuhi ruangan. Langit-langit batu mulai runtuh. Mira menjerit. 'Tempat ini runtuh!' Rhen langsung bangkit. 'Keluar sekarang!' Kaien membantu Mira berdiri. Lyria masih berdiri di depan Archeon. Sebuah batu besar jatuh dari atas. Refleks. Archeon menarik tubuh Lyria ke dalam pelukannya. <em>— Bab 11 selesai —</em></p>" },
                { id: 12, title: "Suara dari Dalam Diri", content: "<p>Lorong batu itu kembali sunyi. Hanya suara napas Archeon dan Lyria yang terdengar. Di ujung lorong, pintu batu besar terbuka penuh. 'Pemilik telah kembali.' Lyria menggenggam tangan Archeon. 'Kita tidak harus masuk.' Archeon menatap pintu itu. 'Aku harus tahu.' <em>— Bab 12 selesai —</em></p>" },
                { id: 13, title: "Cahaya yang Tetap Tinggal", content: "<p>Ruangan itu kembali sunyi. Archeon berlutut, tangannya gemetar. Lyria memeluknya. 'Archeon... dengar suaraku. Kau di sini. Bukan di masa lalu.' Archeon menatap wajahnya lama. Dan perlahan, suara di dalam kepalanya mereda. 'Kalau kau takut... maka takutlah bersama aku. Aku tidak akan pergi.' <em>— Bab 13 selesai —</em></p>" },
                { id: 14, title: "Luka Pertama", content: "<p>Debu masih memenuhi ruangan. Tiga sosok berjubah hitam berdiri di pintu reruntuhan. 'Subjek ditemukan. Eksekusi diizinkan.' Mereka menyerang. Kaien terpental. Rhen terluka. Archeon melihat semuanya. Sosok bertopeng mengangkat tangan. Rantai hitam muncul menuju Lyria. Archeon berlari mendorong Lyria. Rantai itu menghantam tubuh Archeon. <em>— Bab 14 selesai —</em></p>" },
                { id: 15, title: "Simbol Kedua", content: "<p>Ruangan mendadak sunyi. Selene berdiri dengan mata perak menyala. 'Aku bilang... jangan sentuh dia.' Waktu mulai retak. Archeon masih berlutut. Simbol hitam di telapak tangannya berdenyut lebih keras. Lalu garis hitam baru muncul naik sampai pergelangan tangan. Simbol kedua. Lebih tajam. Lebih gelap. <em>— Bab 15 selesai —</em></p>" },
                { id: 16, title: "Nama yang Dibisikkan", content: "<p>Ruangan reruntuhan masih dipenuhi debu. 'Master harus diberitahu.' Dari balik pohon, pria berjubah abu-abu muncul. 'Simbol kedua sudah bangkit.' Archeon menatap tajam. 'Siapa Master?' Pria itu diam sesaat. 'Azravel.' Nama itu membuat kepala Archeon berdenyut hebat. <em>— Bab 16 selesai —</em></p>" },
                { id: 17, title: "Kota yang Menolak", content: "<p>Malam mulai turun saat mereka kembali ke Astera. Begitu Archeon melangkah masuk, beberapa orang langsung berhenti bicara. Bisikan mulai terdengar. 'Itu dia...' 'Anak tanpa mana itu...' 'Katanya monster di utara mati karenanya...' Seorang ibu menarik anaknya menjauh. Lyria berjalan lebih dekat ke Archeon. <em>— Bab 17 selesai —</em></p>" },
                { id: 18, title: "Pedang Tanpa Mana", content: "<p>Pagi di Astera terasa lebih sunyi. Archeon berdiri memegang pedang kayu. 'Aku tidak punya mana. Kalau begitu, aku harus punya sesuatu yang lain.' Beberapa jam berlalu. Keringat membasahi bajunya. Rhen mengangkat pedang. 'Cukup.' Archeon masih berdiri. 'Belum.' <em>— Bab 18 selesai —</em></p>" },
                { id: 19, title: "Malam Berdarah Astera", content: "<p>Angin malam berhembus pelan. Tiba-tiba ledakan besar mengguncang Astera. Di langit, lingkaran hitam besar muncul. Puluhan makhluk bayangan jatuh ke jalan-jalan kota. Warga berteriak panik. Makhluk raksasa mendarat di tengah kota. Azravel menatap makhluk itu. 'Silent Order... sudah gila.' <em>— Bab 19 selesai —</em></p>" },
                { id: 20, title: "Nama yang Mulai Bangkit", content: "<p>Makhluk raksasa itu berdiri di tengah kota. 'Origin...' Makhluk itu menyerang. Rhen terpental. Kaien terlempar. Archeon jatuh berlutut. Lyria memeluknya. 'Archeon! Lihat aku!' Makhluk itu menyerang Lyria. Tanpa sadar, kata itu keluar: 'Berhenti.' Seluruh kota sunyi. Makhluk itu perlahan berlutut. 'Origin... telah kembali.' <em>— Bab 20 selesai —</em></p>" },
                { id: 21, title: "Setelah Nama Itu Bangkit", content: "<p>Malam di Astera mendadak sunyi. Puluhan monster bayangan berlutut di hadapan Archeon. Tak bergerak. Tak menyerang. Mira menatap dengan bibir gemetar. 'Ini... bukan lagi kebetulan.' Rhen berdiri sambil menahan luka. 'Archeon.' Monster raksasa mengangkat kepala. 'Perintah.' <em>— Bab 21 selesai —</em></p>" },
                { id: 22, title: "Mata di Dalam Bayangan", content: "<p>Malam di Astera belum berakhir. Orang-orang keluar dari tempat persembunyian. Mereka melihat Archeon. Bisikan mulai menyebar. 'Anak terkutuk...' 'Pembawa bencana...' 'Dia bukan manusia...' Lyria berdiri lebih dekat. Archeon melangkah menjauh. 'Mereka benar.' 'Aku sendiri sudah tidak tahu lagi.' <em>— Bab 22 selesai —</em></p>" },
                { id: 23, title: "Jalan ke Timur", content: "<p>Mereka memutuskan meninggalkan Astera. Selene menunjuk ke timur. 'Kita harus ke sana.' Perjalanan melelahkan. Hutan semakin gelap. Tapi Archeon terus melangkah. Lyria tetap di sampingnya. Di kejauhan, bayangan hitam mulai mengikuti mereka. <em>— Bab 23 selesai —</em></p>" },
                { id: 24, title: "Kota Abu yang Sunyi", content: "<p>Mereka sampai di sebuah desa kosong. Tidak ada suara. Tidak ada kehidupan. Hanya rumah-rumah kayu tua yang setengah rusak. Mira memeluk lengannya. 'Aku tidak suka ini.' Rhen menghunus pedang. 'Terlalu sepi.' Lyria menatap pintu-pintu rumah. 'Seperti semua orang pergi mendadak.' <em>— Bab 24 selesai —</em></p>" },
                { id: 25, title: "Desa yang Mengingat", content: "<p>Di tengah desa, patung raksasa berlutut. Seorang anak kecil bermata merah berdiri di depan rumah tua. 'Aku yang tertinggal.' Patung raksasa mengangkat kepala. 'Desa ini... telah menunggumu.' Pintu-pintu rumah terbuka. Bayangan manusia muncul. Seorang wanita tua berkata, 'Kami menunggumu...' Lalu hancur menjadi abu. Anak kecil itu berbisik, 'Jangan terlambat kali ini.' <em>— Bab 25 selesai —</em></p>" }
            ]
        }
    ];

    // ==================== GLOBAL VARIABLES ====================
    let currentUser = localStorage.getItem('currentUser') || null;
    let currentUserId = localStorage.getItem('currentUserId') || null;
    let currentKomik = null;
    let currentChapter = null;

    // ==================== AUTH FUNCTIONS ====================
    async function register(username, password) {
        if (username.length < 3) return { success: false, message: 'Username minimal 3 karakter!' };
        if (password.length < 4) return { success: false, message: 'Password minimal 4 karakter!' };
        
        const { data: existing } = await supabase
            .from('users')
            .select('username')
            .eq('username', username)
            .single();
        
        if (existing) return { success: false, message: 'Username sudah digunakan!' };
        
        const { error } = await supabase
            .from('users')
            .insert([{ username, password, created_at: new Date() }]);
        
        if (error) return { success: false, message: error.message };
        return { success: true, message: 'Registrasi berhasil! Silakan login.' };
    }

    async function login(username, password) {
        const { data, error } = await supabase
            .from('users')
            .select('id, username')
            .eq('username', username)
            .eq('password', password)
            .single();
        
        if (error || !data) return { success: false, message: 'Username atau password salah!' };
        
        await supabase.from('users').update({ last_login: new Date() }).eq('id', data.id);
        
        currentUser = data.username;
        currentUserId = data.id;
        
        localStorage.setItem('currentUser', currentUser);
        localStorage.setItem('currentUserId', currentUserId);
        
        updateUserDropdown();
        return { success: true, message: `Selamat datang, ${username}!` };
    }

    function logout() {
        currentUser = null;
        currentUserId = null;
        localStorage.removeItem('currentUser');
        localStorage.removeItem('currentUserId');
        updateUserDropdown();
        showHomePage();
    }

    // ==================== COMMENTS FUNCTIONS ====================
    async function loadComments(komikId, chapterId) {
        try {
            const { data, error } = await supabase
                .from('comments')
                .select('*')
                .eq('komik_id', komikId)
                .eq('chapter_id', chapterId)
                .order('created_at', { ascending: true });
            if (error) return [];
            return data || [];
        } catch (e) {
            return [];
        }
    }

    async function addComment(komikId, chapterId, content) {
        if (!currentUserId || !content.trim()) return false;
        try {
            const { error } = await supabase.from('comments').insert([{
                komik_id: komikId,
                chapter_id: chapterId,
                user_id: currentUserId,
                user_name: currentUser,
                content: content.trim(),
                created_at: new Date()
            }]);
            if (error) return false;
            return true;
        } catch (e) {
            return false;
        }
    }

    // ==================== UI FUNCTIONS ====================
    function renderKomikGrid() {
        const grid = document.getElementById('komikGrid');
        if (!grid) return;
        
        grid.innerHTML = komikData.map(komik => `
            <div class="komik-card" onclick="selectKomik(${komik.id})">
                <div class="komik-image">
                    <img src="${komik.image}" alt="${komik.title}" onerror="this.src='https://placehold.co/300x200/2a2a2a/b87c4f?text=${encodeURIComponent(komik.title.substring(0,20))}'">
                </div>
                <div class="komik-info">
                    <div class="komik-title">${komik.title}</div>
                    <div class="komik-desc">${komik.description.substring(0, 80)}${komik.description.length > 80 ? '...' : ''}</div>
                </div>
            </div>
        `).join('');
    }

    function selectKomik(komikId) {
        if (!currentUser) {
            openAuthModal('login');
            return;
        }
        
        currentKomik = komikData.find(k => k.id === komikId);
        if (!currentKomik) return;
        
        document.getElementById('komikTitle').innerHTML = `📖 ${currentKomik.title}`;
        renderChapterList();
        showChaptersPage();
    }

    function renderChapterList() {
        const container = document.getElementById('chapter-list-container');
        if (!container || !currentKomik) return;
        
        container.innerHTML = currentKomik.chapters.map(ch => `
            <div class="chapter-card" onclick="openChapter(${ch.id})">
                <div class="chapter-num">Bab ${ch.id}</div>
                <div class="chapter-title">${ch.title}</div>
            </div>
        `).join('');
    }

    async function openChapter(chapterId) {
        if (!currentUser) {
            openAuthModal('login');
            return;
        }
        
        currentChapter = currentKomik.chapters.find(ch => ch.id === chapterId);
        if (!currentChapter) return;
        
        const comments = await loadComments(currentKomik.id, chapterId);
        
        let commentsHtml = '';
        if (comments.length > 0) {
            commentsHtml = comments.map(c => `
                <div class="comment">
                    <div class="comment-user">${c.user_name === 'Varen' ? '👑' : '👤'} ${c.user_name}<span class="comment-date">${new Date(c.created_at).toLocaleString()}</span>${c.user_name === 'Varen' ? ' (Penulis)' : ''}</div>
                    <div class="comment-text">${c.content.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
                </div>
            `).join('');
        } else {
            commentsHtml = '<p style="opacity:0.6;">Belum ada komentar. Jadilah yang pertama!</p>';
        }
        
        const currentIndex = currentKomik.chapters.findIndex(ch => ch.id === chapterId);
        const prevChapter = currentIndex > 0 ? currentKomik.chapters[currentIndex - 1] : null;
        const nextChapter = currentIndex < currentKomik.chapters.length - 1 ? currentKomik.chapters[currentIndex + 1] : null;
        
        const readingContainer = document.getElementById('readingContainer');
        readingContainer.innerHTML = `
            <div class="reading-content">
                <div class="reading-title">Bab ${currentChapter.id} — ${currentChapter.title}</div>
                <div class="reading-text">${currentChapter.content}</div>
                <div class="nav-chapter">
                    <button id="prevChapterBtn" ${!prevChapter ? 'disabled' : ''}>← Bab Sebelumnya</button>
                    <button id="nextChapterBtn" ${!nextChapter ? 'disabled' : ''}>Bab Selanjutnya →</button>
                </div>
                <div class="comment-section">
                    <h4>💬 Komentar Pembaca (${comments.length})</h4>
                    <div id="commentsList">${commentsHtml}</div>
                    <div class="comment-input">
                        <textarea id="commentText" rows="2" placeholder="Tulis komentar..."></textarea>
                        <button id="submitCommentBtn">Kirim</button>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('prevChapterBtn')?.addEventListener('click', () => {
            if (prevChapter) openChapter(prevChapter.id);
        });
        
        document.getElementById('nextChapterBtn')?.addEventListener('click', () => {
            if (nextChapter) openChapter(nextChapter.id);
        });
        
        document.getElementById('submitCommentBtn')?.addEventListener('click', async () => {
            const text = document.getElementById('commentText').value;
            if (await addComment(currentKomik.id, chapterId, text)) {
                document.getElementById('commentText').value = '';
                openChapter(chapterId);
            }
        });
        
        showReadingPage();
    }

    // ==================== PAGE NAVIGATION ====================
    function showHomePage() {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('home').classList.add('active');
    }

    function showChaptersPage() {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('chapters-page').classList.add('active');
    }

    function showReadingPage() {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('reading-page').classList.add('active');
    }

    // ==================== MODAL AUTH ====================
    function openAuthModal(tab = 'login') {
        const modal = document.getElementById('authModal');
        const container = document.getElementById('modalFormContainer');
        container.innerHTML = '';
        
        const loginForm = `
            <h3>🔐 Login</h3>
            <input type="text" id="modalUsername" placeholder="Username">
            <input type="password" id="modalPassword" placeholder="Password">
            <button id="modalLoginBtn">Login</button>
            <div class="auth-switch">Belum punya akun? <a id="switchToRegister">Daftar di sini</a></div>
            <div id="modalMessage" class="auth-message"></div>
        `;
        
        const registerForm = `
            <h3>📝 Daftar Akun Baru</h3>
            <input type="text" id="modalRegUsername" placeholder="Username (min 3 karakter)">
            <input type="password" id="modalRegPassword" placeholder="Password (min 4 karakter)">
            <button id="modalRegisterBtn">Daftar</button>
            <div class="auth-switch">Sudah punya akun? <a id="switchToLogin">Login di sini</a></div>
            <div id="modalMessage" class="auth-message"></div>
        `;
        
        container.innerHTML = tab === 'login' ? loginForm : registerForm;
        modal.classList.add('active');
        
        if (tab === 'login') {
            document.getElementById('modalLoginBtn')?.addEventListener('click', async () => {
                const username = document.getElementById('modalUsername').value;
                const password = document.getElementById('modalPassword').value;
                const result = await login(username, password);
                const msg = document.getElementById('modalMessage');
                msg.textContent = result.message;
                if (result.success) {
                    setTimeout(() => { modal.classList.remove('active'); showHomePage(); renderKomikGrid(); }, 1000);
                }
            });
            document.getElementById('switchToRegister')?.addEventListener('click', (e) => { e.preventDefault(); openAuthModal('register'); });
        } else {
            document.getElementById('modalRegisterBtn')?.addEventListener('click', async () => {
                const username = document.getElementById('modalRegUsername').value;
                const password = document.getElementById('modalRegPassword').value;
                const result = await register(username, password);
                const msg = document.getElementById('modalMessage');
                msg.textContent = result.message;
                if (result.success) setTimeout(() => openAuthModal('login'), 1500);
            });
            document.getElementById('switchToLogin')?.addEventListener('click', (e) => { e.preventDefault(); openAuthModal('login'); });
        }
    }

    function updateUserDropdown() {
        const dropdown = document.getElementById('dropdownContent');
        if (!dropdown) return;
        if (currentUser) {
            const isAdmin = currentUser === 'Varen';
            dropdown.innerHTML = `<a class="user-name">👤 ${currentUser} ${isAdmin ? '👑' : ''}</a><a id="dropdownLogout">🚪 Logout</a>`;
            document.getElementById('dropdownLogout')?.addEventListener('click', logout);
        } else {
            dropdown.innerHTML = `<a id="dropdownLogin">🔐 Login / Daftar</a>`;
            document.getElementById('dropdownLogin')?.addEventListener('click', () => openAuthModal('login'));
        }
    }

    // ==================== INIT ====================
    function init() {
        renderKomikGrid();
        
        document.getElementById('backToHomeBtn')?.addEventListener('click', showHomePage);
        document.getElementById('backToChaptersBtn')?.addEventListener('click', showChaptersPage);
        
        const accountBtn = document.getElementById('accountBtn');
        const dropdown = document.getElementById('userDropdown');
        if (accountBtn) {
            accountBtn.onclick = (e) => {
                e.stopPropagation();
                dropdown.classList.toggle('active');
            };
        }
        document.onclick = () => dropdown?.classList.remove('active');
        
        const modal = document.getElementById('authModal');
        document.getElementById('closeModalBtn')?.addEventListener('click', () => modal.classList.remove('active'));
        modal?.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
        
        updateUserDropdown();
    }
    
    init();
</script>
</body>
</html>
