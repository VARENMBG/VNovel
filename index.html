<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Archeon Novel Platform</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:#fff;
}
header{
    background:#1a1a1a;
    text-align:center;
    padding:15px;
    font-size:24px;
    color:#9d4edd;
}
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}
.card{
    background:#1f1f1f;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}
input, textarea, button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-size:15px;
}
input, textarea{
    background:#2a2a2a;
    color:#fff;
}
button{
    background:#7b2cbf;
    color:#fff;
    cursor:pointer;
}
button:hover{
    background:#9d4edd;
}
.hidden{
    display:none;
}
.novel{
    background:#2b2b2b;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
}
.cover{
    width:100%;
    max-height:250px;
    object-fit:cover;
    border-radius:10px;
}
.chapter{
    background:#181818;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
}
</style>
</head>
<body>

<header>Archeon Novel Platform</header>

<div class="container">

<div class="card" id="authBox">
<h2>Login</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="card hidden" id="dashboard">
<h2>Dashboard</h2>
<p id="userInfo"></p>
<button id="btnNovel" class="hidden" onclick="showNovelForm()">Tambah Novel</button>
<button id="btnChapter" class="hidden" onclick="showChapterForm()">Tambah Chapter</button>
<button onclick="logout()">Logout</button>
</div>

<div class="card hidden" id="novelForm">
<h2>Tambah Novel</h2>
<input type="text" id="novelTitle" placeholder="Judul Novel">
<textarea id="novelDesc" placeholder="Deskripsi Novel"></textarea>
<input type="file" id="novelCover" accept="image/*">
<button onclick="addNovel()">Simpan Novel</button>
</div>

<div class="card hidden" id="chapterForm">
<h2>Tambah Chapter</h2>
<input type="number" id="chapterNovelId" placeholder="ID Novel">
<input type="text" id="chapterTitle" placeholder="Judul Chapter">
<textarea id="chapterContent" placeholder="Isi Chapter"></textarea>
<button onclick="addChapter()">Simpan Chapter</button>
</div>

<div class="card">
<h2>Daftar Novel</h2>
<div id="novelList"></div>
</div>

</div>

<script>
const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;

const users = [
    {
        username:"Varen",
        password:"farel1211",
        role:"developer"
    }
];

function login(){
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const user = users.find(
        u => u.username === username && u.password === password
    );

    if(!user){
        alert("Login gagal");
        return;
    }

    currentUser = user;

    document.getElementById("authBox").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    document.getElementById("userInfo").innerText =
        "Login sebagai " + user.username + " (" + user.role + ")";

    if(["developer","admin","writer"].includes(user.role)){
        document.getElementById("btnNovel").classList.remove("hidden");
        document.getElementById("btnChapter").classList.remove("hidden");
    }

    loadNovels();
}

function logout(){
    location.reload();
}

function showNovelForm(){
    document.getElementById("novelForm").classList.remove("hidden");
}

function showChapterForm(){
    document.getElementById("chapterForm").classList.remove("hidden");
}

async function addNovel(){
    const title = document.getElementById("novelTitle").value;
    const desc = document.getElementById("novelDesc").value;
    const file = document.getElementById("novelCover").files[0];

    let coverUrl = "";

    if(file){
        const fileName = Date.now() + "_" + file.name;

        const { error:uploadError } = await db.storage
            .from("novel-covers")
            .upload(fileName, file);

        if(uploadError){
            alert(uploadError.message);
            return;
        }

        const { data } = db.storage
            .from("novel-covers")
            .getPublicUrl(fileName);

        coverUrl = data.publicUrl;
    }

    const { error } = await db.from("novels").insert([
        {
            title:title,
            description:desc,
            cover_url:coverUrl
        }
    ]);

    if(error){
        alert(error.message);
        return;
    }

    alert("Novel berhasil ditambahkan");
    loadNovels();
}

async function addChapter(){
    const novelId = document.getElementById("chapterNovelId").value;
    const title = document.getElementById("chapterTitle").value;
    const content = document.getElementById("chapterContent").value;

    const { error } = await db.from("chapters").insert([
        {
            novel_id:novelId,
            title:title,
            content:content
        }
    ]);

    if(error){
        alert(error.message);
        return;
    }

    alert("Chapter berhasil ditambahkan");
    loadNovels();
}

async function loadNovels(){
    const { data:novels } = await db.from("novels").select("*").order("id");
    const { data:chapters } = await db.from("chapters").select("*").order("id");

    const list = document.getElementById("novelList");
    list.innerHTML = "";

    novels.forEach(novel => {
        const chapterList = chapters.filter(c => c.novel_id == novel.id);

        let html = `
        <div class="novel">
            ${novel.cover_url ? `<img src="${novel.cover_url}" class="cover">` : ""}
            <h3>${novel.title}</h3>
            <p>${novel.description}</p>
            <small>ID Novel: ${novel.id}</small>
        `;

        chapterList.forEach(ch => {
            html += `
            <div class="chapter">
                <b>${ch.title}</b>
                <p>${ch.content.substring(0,200)}...</p>
            </div>
            `;
        });

        html += `</div>`;

        list.innerHTML += html;
    });
}

loadNovels();
</script>

</body>
</html>
