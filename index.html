<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNovel - Archeon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f0e8;
            color: #333;
            padding: 15px;
        }

        .dark {
            background: #1a1a1a;
            color: #eee;
        }

        .dark .card, .dark .chapter-card, .dark .modal-content, .dark .reading-box {
            background: #2a2a2a;
            color: #eee;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #b87c4f;
        }

        .logo h1 {
            color: #b87c4f;
            font-size: 1.3rem;
        }

        .btn-icon {
            background: #b87c4f;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            margin-left: 5px;
        }

        /* Card Novel (tanpa gambar) */
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            text-align: center;
            border: 1px solid #ddd;
            width: 200px;
        }

        .card:hover {
            background: #f0ebe4;
            border-color: #b87c4f;
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            color: #b87c4f;
        }

        .card-desc {
            font-size: 12px;
            margin-top: 8px;
            opacity: 0.7;
        }

        /* Chapter Grid */
        .chapter-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .chapter-card {
            background: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            width: 100px;
            border: 1px solid #ddd;
        }

        .chapter-card:hover {
            background: #f0ebe4;
            border-color: #b87c4f;
        }

        .chapter-num {
            color: #b87c4f;
            font-size: 11px;
        }

        .chapter-title {
            font-size: 11px;
            margin-top: 5px;
        }

        /* Reading */
        .reading-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
        }

        .reading-title {
            font-size: 20px;
            color: #b87c4f;
            border-left: 3px solid #b87c4f;
            padding-left: 10px;
            margin-bottom: 15px;
        }

        .reading-text p {
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .nav-chapter {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 10px;
        }

        .nav-chapter button {
            background: #b87c4f;
            border: none;
            color: white;
            padding: 8px;
            border-radius: 20px;
            cursor: pointer;
            flex: 1;
        }

        .nav-chapter button:disabled {
            opacity: 0.4;
        }

        /* Komentar */
        .comment-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
        }

        .comment {
            background: #f0ebe4;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .comment-user {
            font-weight: bold;
            color: #b87c4f;
            font-size: 12px;
        }

        .comment-text {
            font-size: 13px;
            margin-top: 3px;
        }

        .comment-input {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .comment-input textarea {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-family: inherit;
        }

        .comment-input button {
            background: #b87c4f;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        .login-prompt {
            text-align: center;
            padding: 10px;
            background: #f0ebe4;
            border-radius: 8px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 16px;
            width: 280px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .modal-content button {
            background: #b87c4f;
            border: none;
            color: white;
            padding: 8px;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
        }

        .switch-auth {
            margin-top: 10px;
            font-size: 12px;
        }

        .switch-auth a {
            color: #b87c4f;
            cursor: pointer;
        }

        .back-btn {
            background: #b87c4f;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
            font-size: 12px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <h1>📚 VNOVEL</h1>
    </div>
    <div>
        <button class="btn-icon" id="darkModeBtn">🌙</button>
        <button class="btn-icon" id="accountBtn">👤</button>
    </div>
</div>

<div id="app">
    <!-- Halaman Home -->
    <div id="homePage">
        <div id="novelList"></div>
    </div>

    <!-- Halaman Daftar Bab -->
    <div id="chaptersPage" class="hidden">
        <button class="back-btn" id="backHomeBtn">← Kembali</button>
        <h2 id="novelTitle" style="color:#b87c4f; margin:10px 0;"></h2>
        <div id="chapterList" class="chapter-grid"></div>
    </div>

    <!-- Halaman Baca -->
    <div id="readPage" class="hidden">
        <button class="back-btn" id="backChaptersBtn">← Daftar Bab</button>
        <div id="readingArea"></div>
    </div>
</div>

<div class="footer">
    © 2026 VNovel — Archeon: The End Before Beginning
</div>

<!-- Modal Login -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <div id="authForm"></div>
    </div>
</div>

<script>
    // ==================== DATA ====================
    let currentUser = localStorage.getItem('currentUser') || null;
    let currentNovel = null;
    
    // Judul Bab
    const judulBab = [
        "Anak yang Lahir dalam Keheningan", "Hari yang Tidak Memilihnya", "Yang Dibuang Oleh Cahaya",
        "Langkah Pertama di Luar Cahaya", "Kota di Ujung Hutan", "Nama yang Dicari Kegelapan",
        "Nama yang Bukan Miliknya", "Jejak yang Mulai Terbuka", "Reruntuhan yang Mengenalnya",
        "Pintu Kedua", "Runtuhan yang Memilih", "Suara dari Dalam Diri",
        "Cahaya yang Tetap Tinggal", "Luka Pertama", "Simbol Kedua",
        "Nama yang Dibisikkan", "Kota yang Menolak", "Pedang Tanpa Mana",
        "Malam Berdarah Astera", "Nama yang Mulai Bangkit", "Setelah Nama Itu Bangkit",
        "Mata di Dalam Bayangan", "Jalan ke Timur", "Kota Abu yang Sunyi", "Desa yang Mengingat"
    ];

    // Isi cerita
    const isiCerita = `Malam itu desa Elaris diselimuti kabut lebih tebal dari biasanya. Tidak ada hujan. Tidak ada angin. Tidak ada suara malam. Bahkan hutan di sekitar desa terasa diam, seolah seluruh dunia sedang menunggu sesuatu. Di sebuah rumah kayu sederhana di pinggir desa, seorang bayi laki-laki akhirnya lahir. Tangisannya kecil. Pelan. Hampir tidak terdengar. Ibunya, Elena, memeluk bayi itu dengan napas lelah. Di sampingnya, ayahnya, Daren, menatap dengan wajah tegang. Seperti tradisi desa, tabib tua bernama Sera meletakkan tangannya di dada bayi itu untuk merasakan aliran mana pertama. Setiap anak yang lahir di Elaris selalu membawa mana. Sedikit ataupun besar. Namun saat Sera menutup mata, wajahnya perlahan berubah. Ia membuka mata pelan. Lalu menatap bayi itu sekali lagi. <strong>Tidak ada.</strong> Tidak ada mana. Sama sekali. <br><br>Cerita berlanjut...`;

    // Data Novel
    const novelData = {
        id: 1,
        title: "Archeon: The End Before Beginning",
        desc: "Kisah anak tanpa mana yang menyimpan kekuatan dewa.",
        chapters: []
    };

    // Generate 25 chapter
    for (let i = 0; i < 25; i++) {
        novelData.chapters.push({
            id: i + 1,
            title: judulBab[i],
            content: `<p>${isiCerita}</p><p><em>— Bab ${i+1} selesai —</em></p>`
        });
    }

    // ==================== FUNGSI ====================
    function showPage(page) {
        document.getElementById('homePage').classList.add('hidden');
        document.getElementById('chaptersPage').classList.add('hidden');
        document.getElementById('readPage').classList.add('hidden');
        document.getElementById(page).classList.remove('hidden');
    }

    function renderHome() {
        const container = document.getElementById('novelList');
        container.innerHTML = `
            <div class="card" onclick="openNovel()">
                <div class="card-title">📖 ${novelData.title}</div>
                <div class="card-desc">${novelData.desc}</div>
            </div>
        `;
    }

    window.openNovel = function() {
        currentNovel = novelData;
        document.getElementById('novelTitle').innerHTML = currentNovel.title;
        renderChapterList();
        showPage('chaptersPage');
    }

    function renderChapterList() {
        const container = document.getElementById('chapterList');
        container.innerHTML = currentNovel.chapters.map(ch => `
            <div class="chapter-card" onclick="openChapter(${ch.id})">
                <div class="chapter-num">Bab ${ch.id}</div>
                <div class="chapter-title">${ch.title}</div>
            </div>
        `).join('');
    }

    window.openChapter = function(chapterId) {
        const bab = currentNovel.chapters.find(ch => ch.id === chapterId);
        if (!bab) return;
        
        // Load komentar
        const comments = loadComments(chapterId);
        let komenHtml = comments.length > 0 ? comments.map(c => `
            <div class="comment">
                <div class="comment-user">${c.user}</div>
                <div class="comment-text">${c.text}</div>
            </div>
        `).join('') : '<p>Belum ada komentar.</p>';
        
        let formKomen = currentUser ? `
            <div class="comment-input">
                <textarea id="komenText" rows="2" placeholder="Tulis komentar..."></textarea>
                <button onclick="kirimKomen(${chapterId})">Kirim</button>
            </div>
        ` : `<div class="login-prompt">🔐 <a onclick="openAuthModal('login')">Login</a> untuk berkomentar</div>`;
        
        const currentIdx = currentNovel.chapters.findIndex(ch => ch.id === chapterId);
        const prevBab = currentIdx > 0 ? currentNovel.chapters[currentIdx - 1] : null;
        const nextBab = currentIdx < currentNovel.chapters.length - 1 ? currentNovel.chapters[currentIdx + 1] : null;
        
        const container = document.getElementById('readingArea');
        container.innerHTML = `
            <div class="reading-box">
                <div class="reading-title">Bab ${bab.id} — ${bab.title}</div>
                <div class="reading-text">${bab.content}</div>
                <div class="nav-chapter">
                    <button id="prevBtn" ${!prevBab ? 'disabled' : ''}>← Sebelumnya</button>
                    <button id="nextBtn" ${!nextBab ? 'disabled' : ''}>Selanjutnya →</button>
                </div>
                <div class="comment-section">
                    <h4>💬 Komentar (${comments.length})</h4>
                    <div id="komenList">${komenHtml}</div>
                    ${formKomen}
                </div>
            </div>
        `;
        
        document.getElementById('prevBtn')?.onclick = () => { if (prevBab) openChapter(prevBab.id); };
        document.getElementById('nextBtn')?.onclick = () => { if (nextBab) openChapter(nextBab.id); };
        
        showPage('readPage');
    }

    window.kirimKomen = function(chapterId) {
        const text = document.getElementById('komenText').value;
        if (!text.trim()) return;
        const key = `komentar_${chapterId}`;
        let komen = localStorage.getItem(key);
        komen = komen ? JSON.parse(komen) : [];
        komen.push({ user: currentUser, text: text, date: new Date().toLocaleString() });
        localStorage.setItem(key, JSON.stringify(komen));
        openChapter(chapterId);
    }

    function loadComments(chapterId) {
        const key = `komentar_${chapterId}`;
        const komen = localStorage.getItem(key);
        return komen ? JSON.parse(komen) : [];
    }

    // ==================== LOGIN ====================
    function loadUsers() {
        const users = localStorage.getItem('users');
        if (users) return JSON.parse(users);
        const defaultUsers = { 'Varen': { password: 'farelgg1211' } };
        localStorage.setItem('users', JSON.stringify(defaultUsers));
        return defaultUsers;
    }

    function register(username, password) {
        const users = loadUsers();
        if (users[username]) return 'Username sudah digunakan!';
        if (username.length < 3) return 'Username minimal 3 karakter!';
        if (password.length < 4) return 'Password minimal 4 karakter!';
        users[username] = { password: password };
        localStorage.setItem('users', JSON.stringify(users));
        return 'success';
    }

    function login(username, password) {
        const users = loadUsers();
        const user = users[username];
        if (!user) return 'Username tidak ditemukan!';
        if (user.password !== password) return 'Password salah!';
        localStorage.setItem('currentUser', username);
        currentUser = username;
        return 'success';
    }

    function logout() {
        localStorage.removeItem('currentUser');
        currentUser = null;
        location.reload();
    }

    function updateUserBtn() {
        const btn = document.getElementById('accountBtn');
        if (currentUser) {
            btn.innerHTML = '👤';
            btn.onclick = () => {
                if (confirm(`Logout dari ${currentUser}?`)) logout();
            };
        } else {
            btn.innerHTML = '🔐';
            btn.onclick = () => openAuthModal('login');
        }
    }

    function openAuthModal(tab = 'login') {
        const modal = document.getElementById('authModal');
        const form = document.getElementById('authForm');
        
        if (tab === 'login') {
            form.innerHTML = `
                <h3>🔐 LOGIN</h3>
                <input type="text" id="loginUser" placeholder="Username">
                <input type="password" id="loginPass" placeholder="Password">
                <button id="loginAction">Login</button>
                <div class="switch-auth">Belum punya akun? <a id="toReg">Daftar</a></div>
                <div id="authMsg" style="color:#b87c4f; margin-top:8px;"></div>
            `;
            document.getElementById('loginAction').onclick = () => {
                const result = login(document.getElementById('loginUser').value, document.getElementById('loginPass').value);
                if (result === 'success') {
                    modal.classList.remove('show');
                    location.reload();
                } else {
                    document.getElementById('authMsg').innerText = result;
                }
            };
            document.getElementById('toReg').onclick = (e) => { e.preventDefault(); openAuthModal('register'); };
        } else {
            form.innerHTML = `
                <h3>📝 DAFTAR</h3>
                <input type="text" id="regUser" placeholder="Username (min 3)">
                <input type="password" id="regPass" placeholder="Password (min 4)">
                <button id="regAction">Daftar</button>
                <div class="switch-auth">Sudah punya akun? <a id="toLogin">Login</a></div>
                <div id="authMsg" style="color:#b87c4f; margin-top:8px;"></div>
            `;
            document.getElementById('regAction').onclick = () => {
                const result = register(document.getElementById('regUser').value, document.getElementById('regPass').value);
                if (result === 'success') {
                    openAuthModal('login');
                } else {
                    document.getElementById('authMsg').innerText = result;
                }
            };
            document.getElementById('toLogin').onclick = (e) => { e.preventDefault(); openAuthModal('login'); };
        }
        modal.classList.add('show');
    }

    // ==================== DARK MODE ====================
    function initDarkMode() {
        const dark = localStorage.getItem('dark') === 'true';
        if (dark) document.body.classList.add('dark');
        const btn = document.getElementById('darkModeBtn');
        btn.textContent = dark ? '☀️' : '🌙';
        btn.onclick = () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('dark', isDark);
            btn.textContent = isDark ? '☀️' : '🌙';
        };
    }

    // ==================== INIT ====================
    function init() {
        renderHome();
        updateUserBtn();
        initDarkMode();
        
        document.getElementById('backHomeBtn').onclick = () => showPage('homePage');
        document.getElementById('backChaptersBtn').onclick = () => showPage('chaptersPage');
        
        const modal = document.getElementById('authModal');
        modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('show'); };
    }
    
    init();
</script>
</body>
</html>
