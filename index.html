<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VNovel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#f5f5f0;color:#222}
.header{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;background:#fff;border-bottom:2px solid #b87c4f}
.icon-btn{width:40px;height:40px;border:none;border-radius:50%;background:#b87c4f;color:#fff;cursor:pointer}
.container{padding:20px}
.page{display:none}
.page.active{display:block}
.komik-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}
.komik-card{background:#fff;border-radius:14px;overflow:hidden;cursor:pointer;border:1px solid #ddd}
.komik-image img{width:100%;height:220px;object-fit:cover}
.komik-info{padding:15px}
.chapter-card{padding:15px;background:#fff;border-radius:12px;margin-bottom:10px;cursor:pointer}
.reading-content{background:#fff;padding:25px;border-radius:20px}
.comment{background:#f3f3f3;padding:12px;border-radius:12px;margin-bottom:10px}
.comment-input textarea{width:100%;padding:10px}
.comment-input button{margin-top:10px;padding:10px 18px;background:#b87c4f;color:#fff;border:none;border-radius:20px;cursor:pointer}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);justify-content:center;align-items:center}
.modal.active{display:flex}
.modal-content{background:#fff;width:90%;max-width:400px;padding:25px;border-radius:20px;position:relative}
.close-modal{position:absolute;top:10px;right:15px;border:none;background:none;font-size:20px;cursor:pointer}
.modal-content input{width:100%;padding:12px;margin-bottom:10px}
.modal-content button{width:100%;padding:12px;background:#b87c4f;color:#fff;border:none;border-radius:20px}
.user-dropdown{display:none;position:absolute;top:65px;right:20px;background:#fff;border:1px solid #ddd;border-radius:14px;min-width:220px}
.user-dropdown.active{display:block}
.user-dropdown a{display:block;padding:12px;text-decoration:none;color:#222;cursor:pointer}
.back-btn{margin-bottom:10px;padding:8px 15px;border:none;background:#222;color:#fff;border-radius:20px;cursor:pointer}
</style>
</head>
<body>

<div class="header">
    <h2>📚 VNovel</h2>
    <div>
        <button class="icon-btn" id="accountBtn">👤</button>
        <div class="user-dropdown" id="userDropdown">
            <div id="dropdownContent"></div>
        </div>
    </div>
</div>

<div class="container">
    <div id="home" class="page active">
        <div class="komik-grid" id="komikGrid"></div>
    </div>

    <div id="chapters-page" class="page">
        <button class="back-btn" onclick="showPage('home')">← Kembali</button>
        <h2 id="komikTitle"></h2>
        <div id="chapter-list-container"></div>
    </div>

    <div id="reading-page" class="page">
        <button class="back-btn" onclick="showPage('chapters-page')">← Kembali</button>
        <div id="readingContainer"></div>
    </div>
</div>

<div class="modal" id="authModal">
    <div class="modal-content">
        <button class="close-modal" id="closeModalBtn">&times;</button>
        <div id="modalFormContainer"></div>
    </div>
</div>

<input type="file" id="avatarUpload" accept="image/*" style="display:none">

<script>
const JSONBIN_API_KEY = '$2a$10$YGt9SVEtH/qZp0.V/T8dMelv0c4kSSeetnPMBJFV4g43t5Mzmtwqi';
const JSONBIN_BIN_ID = '69e4ab0b856a6821894d4efb';

const komikData = [{
    id:1,
    title:"Archeon",
    description:"Novel fantasi.",
    image:"https://placehold.co/300x400",
    chapters:Array.from({length:5},(_,i)=>({
        id:i+1,
        title:`Bab ${i+1}`,
        content:`<p>Isi novel bab ${i+1}...</p>`
    }))
}];

let currentUser = localStorage.getItem("currentUser") || null;
let currentKomik = null;
let currentChapter = null;

async function loadData(){
    try{
        const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`,{
            headers:{'X-Master-Key':JSONBIN_API_KEY}
        });
        const d = await r.json();
        return d.record || {users:{},comments:{}};
    }catch{
        return {users:{},comments:{}};
    }
}

async function saveData(data){
    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`,{
        method:'PUT',
        headers:{
            'Content-Type':'application/json',
            'X-Master-Key':JSONBIN_API_KEY
        },
        body:JSON.stringify(data)
    });
}

async function register(u,p){
    const d = await loadData();
    if(d.users[u]) return alert("Username sudah ada");
    d.users[u] = {password:p,avatar:""};
    await saveData(d);
    alert("Registrasi berhasil");
    openAuthModal('login');
}

async function login(u,p){
    const d = await loadData();
    if(!d.users[u] || d.users[u].password!==p) return alert("Login gagal");
    currentUser=u;
    localStorage.setItem("currentUser",u);
    authModal.classList.remove("active");
    updateUserDropdown();
}

function logout(){
    currentUser=null;
    localStorage.removeItem("currentUser");
    updateUserDropdown();
}

function renderKomikGrid(){
    komikGrid.innerHTML = komikData.map(k=>`
        <div class="komik-card" onclick="selectKomik(${k.id})">
            <div class="komik-image"><img src="${k.image}"></div>
            <div class="komik-info">
                <h3>${k.title}</h3>
                <p>${k.description}</p>
            </div>
        </div>
    `).join('');
}

window.selectKomik = function(id){
    currentKomik = komikData.find(k=>k.id===id);
    komikTitle.textContent = currentKomik.title;
    chapter-list-container.innerHTML = currentKomik.chapters.map(c=>`
        <div class="chapter-card" onclick="openChapter(${c.id})">${c.title}</div>
    `).join('');
    showPage("chapters-page");
};

window.openChapter = async function(id){
    currentChapter = currentKomik.chapters.find(c=>c.id===id);
    const d = await loadData();
    const key = `${currentKomik.id}_${id}`;
    const comments = d.comments[key] || [];

    readingContainer.innerHTML = `
        <div class="reading-content">
            <h2>${currentChapter.title}</h2>
            ${currentChapter.content}
            <h3 style="margin-top:20px">Komentar</h3>
            ${comments.map(c=>`
                <div class="comment">
                    <b>${c.user}</b><br>${c.text}
                </div>
            `).join('')}
            ${currentUser ? `
            <div class="comment-input">
                <textarea id="commentText"></textarea>
                <button onclick="sendComment()">Kirim</button>
            </div>
            ` : `<p>Login untuk komentar</p>`}
        </div>
    `;
    showPage("reading-page");
};

window.sendComment = async function(){
    const text = document.getElementById("commentText").value.trim();
    if(!text) return;
    const d = await loadData();
    const key = `${currentKomik.id}_${currentChapter.id}`;
    if(!d.comments[key]) d.comments[key]=[];
    d.comments[key].push({user:currentUser,text});
    await saveData(d);
    openChapter(currentChapter.id);
};

function openAuthModal(type='login'){
    modalFormContainer.innerHTML = type==='login' ? `
        <h3>Login</h3>
        <input id="lu" placeholder="Username">
        <input id="lp" type="password" placeholder="Password">
        <button onclick="login(lu.value,lp.value)">Login</button>
        <p><a onclick="openAuthModal('register')">Daftar</a></p>
    ` : `
        <h3>Register</h3>
        <input id="ru" placeholder="Username">
        <input id="rp" type="password" placeholder="Password">
        <button onclick="register(ru.value,rp.value)">Daftar</button>
        <p><a onclick="openAuthModal('login')">Login</a></p>
    `;
    authModal.classList.add("active");
}

async function updateUserDropdown(){
    const d = await loadData();
    const box = dropdownContent;

    if(!currentUser){
        box.innerHTML = `<a onclick="openAuthModal()">Login / Daftar</a>`;
        return;
    }

    const avatar = d.users[currentUser]?.avatar || '';

    box.innerHTML = `
        <a>${avatar ? `<img src="${avatar}" style="width:30px;height:30px;border-radius:50%;vertical-align:middle;margin-right:8px">` : '👤'} ${currentUser}</a>
        <a onclick="changeAvatar()">Ganti Foto</a>
        <a onclick="logout()">Logout</a>
    `;
}

window.changeAvatar = function(){
    avatarUpload.click();
};

avatarUpload.addEventListener("change", async function(e){
    const file = e.target.files[0];
    if(!file || !currentUser) return;

    const reader = new FileReader();
    reader.onload = async function(ev){
        const d = await loadData();
        d.users[currentUser].avatar = ev.target.result;
        await saveData(d);
        updateUserDropdown();
        alert("Foto profil tersimpan");
    };
    reader.readAsDataURL(file);
});

function showPage(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

accountBtn.onclick = e=>{
    e.stopPropagation();
    userDropdown.classList.toggle("active");
};

document.onclick = ()=> userDropdown.classList.remove("active");
closeModalBtn.onclick = ()=> authModal.classList.remove("active");

renderKomikGrid();
updateUserDropdown();
</script>

</body>
</html>
