<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VNovel - Archeon</title>
<style>
body{
    margin:0;
    background:#111;
    color:#ddd;
    font-family:Arial, sans-serif;
}
header{
    background:#181818;
    color:#fff;
    text-align:center;
    padding:20px;
    font-size:32px;
    font-weight:bold;
    border-bottom:1px solid #333;
}
.container{
    max-width:1000px;
    margin:auto;
    padding:25px;
}
.novel-box{
    display:flex;
    flex-wrap:wrap;
    gap:25px;
    background:#1b1b1b;
    padding:20px;
    border-radius:14px;
}
.cover{
    width:220px;
    border-radius:12px;
}
.info{
    flex:1;
}
.info h1{
    margin:0;
    color:#fff;
}
.author{
    margin-top:10px;
    color:#aaa;
}
.rating{
    margin-top:10px;
    color:gold;
    font-size:18px;
}
.desc{
    margin-top:20px;
    line-height:1.8;
}
.chapter-button{
    width:100%;
    margin-top:30px;
    padding:16px;
    background:#222;
    border:none;
    border-radius:10px;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}
.chapter-list{
    display:none;
    background:#181818;
    margin-top:10px;
    border-radius:10px;
    overflow:hidden;
}
.chapter-item{
    padding:15px 20px;
    border-bottom:1px solid #333;
    cursor:pointer;
}
.chapter-item:hover{
    background:#222;
}
.reader{
    margin-top:30px;
    background:#1b1b1b;
    padding:30px;
    border-radius:14px;
    line-height:2;
    white-space:pre-line;
}
.chapter-title{
    font-size:28px;
    color:#fff;
    margin-bottom:25px;
}
</style>
</head>
<body>

<header>VNovel</header>

<div class="container">

<div class="novel-box">
    <img src="cover.jpg" class="cover" alt="Cover Novel">
    <div class="info">
        <h1>Archeon: The End Before Beginning</h1>
        <div class="author">Author: MUHAMMAD ALFAREL HAFIZH</div>
        <div class="rating">★ 4.5 / 5</div>
        <div class="desc">
            Seorang anak tanpa mana di dunia sihir diusir dari desanya,
            tanpa mengetahui bahwa dirinya sendiri adalah awal dari seluruh keberadaan.
        </div>
    </div>
</div>

<button class="chapter-button" onclick="toggleChapters()">
📖 Chapter
</button>

<div class="chapter-list" id="chapterList">
    <div class="chapter-item" onclick="loadChapter(1)">Chapter 1</div>
    <div class="chapter-item" onclick="loadChapter(2)">Chapter 2</div>
</div>

<div class="reader" id="reader"></div>

</div>

<script>
const chapters = {
1: {
title: "Chapter 1 — Anak yang Lahir dalam Keheningan",
content: `Malam itu desa Elaris diselimuti kabut lebih tebal dari biasanya.

Tidak ada hujan.
Tidak ada angin.
Tidak ada suara malam.

Bahkan hutan di sekitar desa terasa diam,
seolah seluruh dunia sedang menunggu sesuatu.

Di sebuah rumah kayu sederhana di pinggir desa,
seorang bayi laki-laki akhirnya lahir.

Tangisannya kecil.
Pelan.
Hampir tidak terdengar.

Ibunya, Elena, memeluk bayi itu dengan napas lelah.
Di sampingnya, ayahnya, Daren, menatap dengan wajah tegang.

Seperti tradisi desa,
tabib tua bernama Sera meletakkan tangannya
di dada bayi itu
untuk merasakan aliran mana pertama.

Setiap anak yang lahir di Elaris
selalu membawa mana.

Namun saat Sera menutup mata,
wajahnya perlahan berubah.

Tidak ada.

Tidak ada mana.

Sama sekali.

Bayi itu diberi nama...

Archeon.

Dan malam itu,
tanpa diketahui siapa pun,
Crystal of Origin di pusat desa
meredup sesaat
sebelum kembali normal.`
},

2: {
title: "Chapter 2 — Hari Ketika Desa Memilih Takut",
content: `Tidak ada seorang pun
yang langsung bergerak
setelah Tetua Rowan
mengucapkan keputusan itu.

Seluruh alun-alun desa
mendadak sunyi.

Bisikan kecil mulai terdengar.

"Anak tanpa mana..."
"Crystal menolaknya..."
"Dia berbeda..."

Lyria melangkah maju.

"Ini tidak adil."

Tetua Rowan menatap dingin.

"Crystal tidak menolaknya."

Ia berhenti sesaat.

"Crystal tidak bisa membaca dirinya."

Semua orang terdiam.

Kalimat itu jauh lebih menakutkan
daripada sekadar anak tanpa mana.

Karena di dunia itu,
setiap makhluk hidup
selalu memiliki jejak mana.

Namun Archeon berbeda.

Bukan lemah.

Tetapi kosong.

Archeon menatap crystal besar itu.

Dan untuk sesaat,
ia merasa sesuatu
di dalam crystal
sedang menatap balik dirinya.

Lalu Rowan berkata pelan.

"Mulai malam ini,
Archeon harus meninggalkan Elaris."

Elena menangis.

Daren mengepalkan tangan.

Lyria menatap tak percaya.

Namun Archeon
hanya berdiri diam.

Karena untuk pertama kalinya,
ia merasa
desa itu
bukan sedang mengusirnya.

Melainkan
mendorongnya menuju
takdir yang sejak awal
sudah menunggunya.

Dan sejak hari itu,
hidup Archeon
mulai berubah.`
}
};

function toggleChapters(){
    const list = document.getElementById("chapterList");
    list.style.display = list.style.display === "block" ? "none" : "block";
}

function loadChapter(id){
    const chapter = chapters[id];
    document.getElementById("reader").innerHTML = `
        <div class="chapter-title">${chapter.title}</div>
        ${chapter.content}
    `;
}

loadChapter(1);
</script>

</body>
</html>
