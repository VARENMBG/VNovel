<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archeon - Reader</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: auto;
    padding: 20px;
    background: #111;
    color: #fff;
}
.chapter-box{
    line-height: 1.8;
    margin-bottom: 40px;
}
textarea{
    width: 100%;
    height: 100px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin-bottom: 10px;
}
button{
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
.comment-box{
    background: #222;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
}
small{
    color: #aaa;
}
</style>
</head>
<body>

<h1>Archeon</h1>

<div class="chapter-box" id="chapterContent">
    <h2>Judul Chapter</h2>
    <p>Isi chapter akan muncul di sini...</p>
</div>

<hr>

<h2>Komentar</h2>

<textarea id="commentInput" placeholder="Tulis komentar..."></textarea>
<button onclick="sendComment()">Kirim Komentar</button>

<div id="commentList"></div>

<script>
const SUPABASE_URL = "https://lyhqlhqrazxhjpxxllqg.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5aHFsaHFyYXp4aGpweHhsbHFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NTk0NTMsImV4cCI6MjA5MjEzNTQ1M30.r4PXoKM15VBItcKH7VhmabzwwXPSVy9uN3nGB8b9rCQ";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ID chapter aktif
const chapterId = localStorage.getItem("currentChapterId") || "chapter-demo";

async function loadComments() {
    const { data, error } = await supabaseClient
        .from("comments")
        .select(`
            id,
            message,
            created_at,
            profiles(username)
        `)
        .eq("chapter_id", chapterId)
        .order("created_at", { ascending: true });

    if (error) {
        console.error("Load comments error:", error);
        return;
    }

    const commentList = document.getElementById("commentList");
    commentList.innerHTML = "";

    data.forEach(comment => {
        const div = document.createElement("div");
        div.className = "comment-box";
        div.innerHTML = `
            <b>${comment.profiles?.username || "User"}</b>
            <p>${comment.message}</p>
            <small>${new Date(comment.created_at).toLocaleString()}</small>
        `;
        commentList.appendChild(div);
    });
}

async function sendComment() {
    const input = document.getElementById("commentInput");
    const message = input.value.trim();

    if (!message) {
        alert("Komentar kosong");
        return;
    }

    const { data: { user } } = await supabaseClient.auth.getUser();

    if (!user) {
        alert("Silakan login terlebih dahulu");
        return;
    }

    const { error } = await supabaseClient
        .from("comments")
        .insert([
            {
                chapter_id: chapterId,
                user_id: user.id,
                message: message
            }
        ]);

    if (error) {
        console.error("Insert error:", error);
        alert("Gagal mengirim komentar");
        return;
    }

    input.value = "";
    loadComments();
}

loadComments();
</script>

</body>
</html>
