    // ==================== GLOBAL VARIABLES ====================
    let currentUser = localStorage.getItem('currentUser') || null;
    let currentUserId = localStorage.getItem('currentUserId') || null;
    let currentUserRole = localStorage.getItem('currentUserRole') || null;
    let currentKomik = null;
    let currentChapter = null;

    // ==================== AUTH FUNCTIONS ====================
    async function register(username, password) {
        if (username.length < 3) return { success: false, message: 'Username minimal 3 karakter!' };
        if (password.length < 4) return { success: false, message: 'Password minimal 4 karakter!' };
        
        const { data: existing } = await supabase
            .from('users')
            .select('username')
            .eq('username', username)
            .single();
        
        if (existing) return { success: false, message: 'Username sudah digunakan!' };
        
        const { error } = await supabase
            .from('users')
            .insert([{ username, password, role: 'user', created_at: new Date() }]);
        
        if (error) return { success: false, message: error.message };
        return { success: true, message: 'Registrasi berhasil! Silakan login.' };
    }

    async function login(username, password) {
        const { data, error } = await supabase
            .from('users')
            .select('id, username, role')
            .eq('username', username)
            .eq('password', password)
            .single();
        
        if (error || !data) return { success: false, message: 'Username atau password salah!' };
        
        await supabase.from('users').update({ last_login: new Date() }).eq('id', data.id);
        
        currentUser = data.username;
        currentUserId = data.id;
        currentUserRole = data.role;
        
        localStorage.setItem('currentUser', currentUser);
        localStorage.setItem('currentUserId', currentUserId);
        localStorage.setItem('currentUserRole', currentUserRole);
        
        updateUserDropdown();
        return { success: true, message: `Selamat datang, ${username}!` };
    }

    function logout() {
        currentUser = null;
        currentUserId = null;
        currentUserRole = null;
        localStorage.removeItem('currentUser');
        localStorage.removeItem('currentUserId');
        localStorage.removeItem('currentUserRole');
        updateUserDropdown();
        showHomePage();
        document.getElementById('admin-page').classList.remove('active');
    }

    function getRoleBadges(role) {
        let badges = '';
        if (role === 'owner') badges = '<span class="role-badge role-owner">👑 Owner</span><span class="role-badge role-writer">✍️ Penulis</span><span class="role-badge role-dev">💻 Developer</span>';
        else if (role === 'admin') badges = '<span class="role-badge role-admin">⭐ Admin</span>';
        else if (role === 'writer') badges = '<span class="role-badge role-writer">✍️ Penulis</span>';
        else badges = '<span class="role-badge" style="background:#666;">📖 Pembaca</span>';
        return badges;
    }

    function isOwner() {
        return currentUserRole === 'owner';
    }

    function isAdmin() {
        return currentUserRole === 'admin' || currentUserRole === 'owner';
    }

    // ==================== ADMIN FUNCTIONS ====================
    async function loadAdminPanel() {
        if (!isAdmin()) return;
        
        const { data: users, error } = await supabase
            .from('users')
            .select('id, username, role')
            .order('created_at', { ascending: true });
        
        if (error) return;
        
        const container = document.getElementById('adminUserList');
        container.innerHTML = users.map(user => `
            <div class="user-item">
                <span><strong>${user.username}</strong> ${getRoleBadges(user.role)}</span>
                <div>
                    <select id="role-${user.id}" ${user.username === 'Varen' ? 'disabled' : ''}>
                        <option value="user" ${user.role === 'user' ? 'selected' : ''}>📖 Pembaca</option>
                        <option value="writer" ${user.role === 'writer' ? 'selected' : ''}>✍️ Penulis</option>
                        <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>⭐ Admin</option>
                    </select>
                    <button onclick="updateUserRole('${user.id}', '${user.username}')" ${user.username === 'Varen' ? 'disabled' : ''}>Simpan</button>
                </div>
            </div>
        `).join('');
    }

    async function updateUserRole(userId, username) {
        const select = document.getElementById(`role-${userId}`);
        const newRole = select.value;
        
        const { error } = await supabase
            .from('users')
            .update({ role: newRole })
            .eq('id', userId);
        
        if (error) {
            alert('Gagal update role: ' + error.message);
        } else {
            alert(`Role ${username} berhasil diubah!`);
            loadAdminPanel();
        }
    }

    // ==================== COMMENTS FUNCTIONS ====================
    async function loadComments(komikId, chapterId) {
        try {
            const { data, error } = await supabase
                .from('comments')
                .select('*')
                .eq('komik_id', komikId)
                .eq('chapter_id', chapterId)
                .order('created_at', { ascending: true });
            if (error) return [];
            return data || [];
        } catch (e) { return []; }
    }

    async function addComment(komikId, chapterId, content) {
        if (!currentUserId || !content.trim()) return false;
        try {
            const { error } = await supabase.from('comments').insert([{
                komik_id: komikId,
                chapter_id: chapterId,
                user_id: currentUserId,
                user_name: currentUser,
                content: content.trim(),
                created_at: new Date()
            }]);
            if (error) return false;
            return true;
        } catch (e) { return false; }
    }

    async function getUserRole(username) {
        const { data } = await supabase.from('users').select('role').eq('username', username).single();
        return data ? data.role : 'user';
    }

        grid.innerHTML = komikData.map(komik => `
            <div class="komik-card" onclick="selectKomik(${komik.id})">
                <div class="komik-image">
                    <img src="${komik.image}" alt="${komik.title}" onerror="this.src='https://placehold.co/300x200/2a2a2a/b87c4f?text=${encodeURIComponent(komik.title.substring(0,20))}'">
                </div>
                <div class="komik-info">
                    <div class="komik-title">${komik.title}</div>
                    <div class="komik-desc">${komik.description.substring(0, 80)}${komik.description.length > 80 ? '...' : ''}</div>
                </div>
            </div>
        `).join('');
    }

    function selectKomik(komikId) {
        if (!currentUser) { openAuthModal('login'); return; }
        currentKomik = komikData.find(k => k.id === komikId);
        if (!currentKomik) return;
        document.getElementById('komikTitle').innerHTML = `📖 ${currentKomik.title}`;
        renderChapterList();
        showChaptersPage();
    }

    function renderChapterList() {
        const container = document.getElementById('chapter-list-container');
        if (!container || !currentKomik) return;
        container.innerHTML = currentKomik.chapters.map(ch => `
            <div class="chapter-card" onclick="openChapter(${ch.id})">
                <div class="chapter-num">Bab ${ch.id}</div>
                <div class="chapter-title">${ch.title}</div>
            </div>
        `).join('');
    }

    async function openChapter(chapterId) {
        if (!currentUser) { openAuthModal('login'); return; }
        currentChapter = currentKomik.chapters.find(ch => ch.id === chapterId);
        if (!currentChapter) return;
        
        const comments = await loadComments(currentKomik.id, chapterId);
        
        let commentsHtml = '';
        if (comments.length > 0) {
            for (const c of comments) {
                const role = await getUserRole(c.user_name);
                commentsHtml += `
                    <div class="comment">
                        <div class="comment-user">${c.user_name} ${getRoleBadges(role)}<span class="comment-date">${new Date(c.created_at).toLocaleString()}</span></div>
                        <div class="comment-text">${c.content.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
                    </div>
                `;
            }
        } else { commentsHtml = '<p style="opacity:0.6;">Belum ada komentar. Jadilah yang pertama!</p>'; }
        
        const currentIndex = currentKomik.chapters.findIndex(ch => ch.id === chapterId);
        const prevChapter = currentIndex > 0 ? currentKomik.chapters[currentIndex - 1] : null;
        const nextChapter = currentIndex < currentKomik.chapters.length - 1 ? currentKomik.chapters[currentIndex + 1] : null;
        
        const readingContainer = document.getElementById('readingContainer');
        readingContainer.innerHTML = `
            <div class="reading-content">
                <div class="reading-title">Bab ${currentChapter.id} — ${currentChapter.title}</div>
                <div class="reading-text">${currentChapter.content}</div>
                <div class="nav-chapter">
                    <button id="prevChapterBtn" ${!prevChapter ? 'disabled' : ''}>← Bab Sebelumnya</button>
                    <button id="nextChapterBtn" ${!nextChapter ? 'disabled' : ''}>Bab Selanjutnya →</button>
                </div>
                <div class="comment-section">
                    <h4>💬 Komentar Pembaca (${comments.length})</h4>
                    <div id="commentsList">${commentsHtml}</div>
                    <div class="comment-input">
                        <textarea id="commentText" rows="2" placeholder="Tulis komentar..."></textarea>
                        <button id="submitCommentBtn">Kirim</button>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('prevChapterBtn')?.addEventListener('click', () => { if (prevChapter) openChapter(prevChapter.id); });
        document.getElementById('nextChapterBtn')?.addEventListener('click', () => { if (nextChapter) openChapter(nextChapter.id); });
        document.getElementById('submitCommentBtn')?.addEventListener('click', async () => {
            const text = document.getElementById('commentText').value;
            if (await addComment(currentKomik.id, chapterId, text)) {
                document.getElementById('commentText').value = '';
                openChapter(chapterId);
            }
        });
        showReadingPage();
    }

    // ==================== PAGE NAVIGATION ====================
    function showHomePage() {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('home').classList.add('active');
    }
    function showChaptersPage() {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('chapters-page').classList.add('active');
    }
    function showReadingPage() {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('reading-page').classList.add('active');
    }
    function showAdminPage() {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('admin-page').classList.add('active');
        loadAdminPanel();
    }

    // ==================== MODAL AUTH ====================
    function openAuthModal(tab = 'login') {
        const modal = document.getElementById('authModal');
        const container = document.getElementById('modalFormContainer');
        container.innerHTML = '';
        const loginForm = `<h3>🔐 Login</h3><input type="text" id="modalUsername" placeholder="Username"><input type="password" id="modalPassword" placeholder="Password"><button id="modalLoginBtn">Login</button><div class="auth-switch">Belum punya akun? <a id="switchToRegister">Daftar di sini</a></div><div id="modalMessage" class="auth-message"></div>`;
        const registerForm = `<h3>📝 Daftar Akun Baru</h3><input type="text" id="modalRegUsername" placeholder="Username (min 3 karakter)"><input type="password" id="modalRegPassword" placeholder="Password (min 4 karakter)"><button id="modalRegisterBtn">Daftar</button><div class="auth-switch">Sudah punya akun? <a id="switchToLogin">Login di sini</a></div><div id="modalMessage" class="auth-message"></div>`;
        container.innerHTML = tab === 'login' ? loginForm : registerForm;
        modal.classList.add('active');
        if (tab === 'login') {
            document.getElementById('modalLoginBtn')?.addEventListener('click', async () => {
                const result = await login(document.getElementById('modalUsername').value, document.getElementById('modalPassword').value);
                const msg = document.getElementById('modalMessage');
                msg.textContent = result.message;
                if (result.success) setTimeout(() => { modal.classList.remove('active'); location.reload(); }, 1000);
            });
            document.getElementById('switchToRegister')?.addEventListener('click', (e) => { e.preventDefault(); openAuthModal('register'); });
        } else {
            document.getElementById('modalRegisterBtn')?.addEventListener('click', async () => {
                const result = await register(document.getElementById('modalRegUsername').value, document.getElementById('modalRegPassword').value);
                const msg = document.getElementById('modalMessage');
                msg.textContent = result.message;
                if (result.success) setTimeout(() => openAuthModal('login'), 1500);
            });
            document.getElementById('switchToLogin')?.addEventListener('click', (e) => { e.preventDefault(); openAuthModal('login'); });
        }
    }

    function updateUserDropdown() {
        const dropdown = document.getElementById('dropdownContent');
        if (!dropdown) return;
        if (currentUser) {
            dropdown.innerHTML = `<a class="user-name">👤 ${currentUser} ${getRoleBadges(currentUserRole)}</a>${isAdmin() ? '<a id="dropdownAdmin">⚙️ Panel Admin</a>' : ''}<a id="dropdownLogout">🚪 Logout</a>`;
            document.getElementById('dropdownLogout')?.addEventListener('click', logout);
            document.getElementById('dropdownAdmin')?.addEventListener('click', () => showAdminPage());
        } else {
            dropdown.innerHTML = `<a id="dropdownLogin">🔐 Login / Daftar</a>`;
            document.getElementById('dropdownLogin')?.addEventListener('click', () => openAuthModal('login'));
        }
    }

    // ==================== THEME TOGGLE ====================
    function initTheme() {
        const theme = localStorage.getItem('theme') || 'light';
        if (theme === 'dark') document.body.classList.add('dark');
        const btn = document.getElementById('themeToggle');
        btn.textContent = theme === 'dark' ? '☀️' : '🌙';
        btn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            btn.textContent = isDark ? '☀️' : '🌙';
        });
    }

    // ==================== INIT ====================
    function init() {
        renderKomikGrid();
        document.getElementById('backToHomeBtn')?.addEventListener('click', showHomePage);
        document.getElementById('backToChaptersBtn')?.addEventListener('click', showChaptersPage);
        document.getElementById('backToHomeFromAdminBtn')?.addEventListener('click', showHomePage);
        const accountBtn = document.getElementById('accountBtn');
        const dropdown = document.getElementById('userDropdown');
        if (accountBtn) accountBtn.onclick = (e) => { e.stopPropagation(); dropdown.classList.toggle('active'); };
        document.onclick = () => dropdown?.classList.remove('active');
        const modal = document.getElementById('authModal');
        document.getElementById('closeModalBtn')?.addEventListener('click', () => modal.classList.remove('active'));
        modal?.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
        updateUserDropdown();
        initTheme();
    }
    init();
</script>
</body>
</html>
