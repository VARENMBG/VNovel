<script>
    // ==================== DATA KOMIK DENGAN JUDUL BAB ====================
    const chapterJudul = {
        1: "Anak yang Lahir dalam Keheningan",
        2: "Hari yang Tidak Memilihnya",
        3: "Yang Dibuang Oleh Cahaya",
        4: "Langkah Pertama di Luar Cahaya",
        5: "Kota di Ujung Hutan",
        6: "Nama yang Dicari Kegelapan",
        7: "Nama yang Bukan Miliknya",
        8: "Jejak yang Mulai Terbuka",
        9: "Reruntuhan yang Mengenalnya",
        10: "Pintu Kedua",
        11: "Runtuhan yang Memilih",
        12: "Suara dari Dalam Diri",
        13: "Cahaya yang Tetap Tinggal",
        14: "Luka Pertama",
        15: "Simbol Kedua",
        16: "Nama yang Dibisikkan",
        17: "Kota yang Menolak",
        18: "Pedang Tanpa Mana",
        19: "Malam Berdarah Astera",
        20: "Nama yang Mulai Bangkit",
        21: "Setelah Nama Itu Bangkit",
        22: "Mata di Dalam Bayangan",
        23: "Jalan ke Timur",
        24: "Kota Abu yang Sunyi",
        25: "Desa yang Mengingat"
    };

    const chapterContents = {
        1: `<p>Malam itu desa Elaris diselimuti kabut lebih tebal dari biasanya. Tidak ada hujan. Tidak ada angin. Tidak ada suara malam. Bahkan hutan di sekitar desa terasa diam, seolah seluruh dunia sedang menunggu sesuatu. Di sebuah rumah kayu sederhana di pinggir desa, seorang bayi laki-laki akhirnya lahir. Tangisannya kecil. Pelan. Hampir tidak terdengar. Ibunya, Elena, memeluk bayi itu dengan napas lelah. Di sampingnya, ayahnya, Daren, menatap dengan wajah tegang. Seperti tradisi desa, tabib tua bernama Sera meletakkan tangannya di dada bayi itu untuk merasakan aliran mana pertama. Setiap anak yang lahir di Elaris selalu membawa mana. Sedikit ataupun besar. Namun saat Sera menutup mata, wajahnya perlahan berubah. Ia membuka mata pelan. Lalu menatap bayi itu sekali lagi. <strong>Tidak ada.</strong> Tidak ada mana. Sama sekali. <em>— Bab 1 selesai —</em></p>`,
        2: `<p>Tahun-tahun berlalu dengan cepat. Anak kecil yang dulu selalu duduk sendirian di bawah pohon kini telah tumbuh menjadi seorang remaja berusia tujuh belas tahun. Archeon berdiri lebih tinggi sekarang. Rambut hitamnya sedikit panjang. Tatapannya tenang. Namun satu hal tidak pernah berubah. Ia tetap tidak memiliki mana. Pagi itu, Archeon duduk di atas bukit kecil di belakang desa. Lyria duduk di sampingnya. 'Kau kabur lagi ke sini?' 'Aku cuma ingin tenang.' Lyria tersenyum kecil. 'Berarti kau gugup.' Hari itu adalah Hari Pengukuran. <em>— Bab 2 selesai —</em></p>`,
        3: `<p>Keheningan menyelimuti alun-alun desa. Setelah tangan Archeon terlepas dari Crystal of Origin, tak ada satu pun cahaya yang muncul. 'Kosong...' 'Benar-benar tidak punya mana...' 'Bahkan kristal menolaknya...' Ketua Rowan melangkah maju. 'Anak tanpa mana tidak bisa hidup di bawah perlindungan desa ini. Mulai hari ini, Archeon diasingkan dari desa.' Lyria melangkah maju. 'Kalau dia pergi... aku ikut.' Rhen, Mira, Kaien, dan Selene juga ikut. <em>— Bab 3 selesai —</em></p>`,
        4: `<p>Malam pertama di luar desa terasa jauh lebih sunyi. Tidak ada suara lonceng malam. Tidak ada cahaya rumah. Yang ada hanya hutan gelap, angin dingin. Archeon duduk di dekat api kecil tanpa banyak bicara. Lyria duduk di sampingnya. 'Kau masih memikirkannya?' Archeon menatap api. 'Aku tidak tahu kenapa aku bisa mendengar suara itu.' Selene menatap gelapnya hutan. 'Besok... kita tidak sendirian.' <em>— Bab 4 selesai —</em></p>`,
        5: `<p>Jalan batu tua itu membawa mereka keluar dari hutan. Di kejauhan, berdiri sebuah kota kecil dengan tembok batu rendah dan gerbang kayu besar. Di atas gerbang tertulis: Astera. Mira langsung tersenyum lebar. 'Akhirnya kita sampai!' Kaien hampir terlihat terharu. 'Aku mau makanan hangat. Sekarang.' Hanya Archeon yang diam. Ia menatap kota itu cukup lama. Lyria memperhatikan wajahnya. 'Kau baik?' 'Hanya terasa aneh.' <em>— Bab 5 selesai —</em></p>`,
        6: `<p>Archeon terbangun dengan napas tertahan. Ia langsung bangkit dari tempat tidur dan menatap ke luar. Jalanan kota Astera sunyi. Pria berjubah abu-abu itu sudah menghilang. 'Kau tidak tidur?' Lyria sudah duduk di tepi ranjang. 'Ada apa?' Archeon menatap jendela. 'Dia ada di luar tadi.' Lyria berjalan mendekat. 'Kenapa dia cuma melihat?' 'Itu yang membuatku khawatir.' <em>— Bab 6 selesai —</em></p>`,
        7: `<p>Suasana di dalam penginapan membeku. 'Origin.' Archeon menatap pria berjubah abu-abu itu. Rhen mengangkat pedangnya. 'Kau salah orang.' Pria itu menjawab, 'Aku tidak pernah salah.' Lyria berdiri lebih dekat. 'Kau siapa?' 'Seorang penjaga.' Pria itu menatap Archeon. 'Segel.' Archeon menatap telapak tangannya. Simbol lingkaran retak itu masih terlihat samar. <em>— Bab 7 selesai —</em></p>`,
        8: `<p>Pagi di Astera terasa berbeda. Archeon berdiri di dekat jendela, menatap telapak tangannya. Simbol lingkaran retak itu masih ada. Lyria masuk. 'Kau belum tidur semalam?' Archeon bertanya, 'Kalau suatu hari aku berubah... apa kau masih percaya padaku?' Lyria menjawab tanpa ragu. 'Aku tidak pernah percaya pada kekuatanmu. Aku percaya padamu.' <em>— Bab 8 selesai —</em></p>`,
        9: `<p>Pecahan Stone Hollow masih berserakan di tanah. 'Kau... bagaimana bisa tahu titik lemahnya?' Archeon masih melihat tangannya sendiri. 'Aku tidak tahu.' Lyria berjalan mendekat, lalu memegang tangannya. 'Kita belum selesai.' Di depan mereka, pintu batu besar yang sebelumnya tertutup rapat kini terbuka perlahan. <em>— Bab 9 selesai —</em></p>`,
        10: `<p>Suara batu bergeser memenuhi lorong. Pintu kedua perlahan terbuka. Di tengah ruangan, berdiri sebuah altar hitam yang dipenuhi retakan bercahaya merah. Di atas altar, melayang sebuah pecahan kristal kecil yang sangat mirip dengan Crystal of Origin. Namun warnanya hitam. Archeon berjalan perlahan mendekat. <em>— Bab 10 selesai —</em></p>`,
        11: `<p>Suara retakan memenuhi ruangan. Langit-langit batu mulai runtuh. Mira menjerit. 'Tempat ini runtuh!' Rhen langsung bangkit. 'Keluar sekarang!' Kaien membantu Mira berdiri. Lyria masih berdiri di depan Archeon. Sebuah batu besar jatuh dari atas. Refleks. Archeon menarik tubuh Lyria ke dalam pelukannya. <em>— Bab 11 selesai —</em></p>`,
        12: `<p>Lorong batu itu kembali sunyi. Hanya suara napas Archeon dan Lyria yang terdengar. Di ujung lorong, pintu batu besar terbuka penuh. 'Pemilik telah kembali.' Lyria menggenggam tangan Archeon. 'Kita tidak harus masuk.' Archeon menatap pintu itu. 'Aku harus tahu.' <em>— Bab 12 selesai —</em></p>`,
        13: `<p>Ruangan itu kembali sunyi. Archeon berlutut, tangannya gemetar. Lyria memeluknya. 'Archeon... dengar suaraku. Kau di sini. Bukan di masa lalu.' Archeon menatap wajahnya lama. Dan perlahan, suara di dalam kepalanya mereda. 'Kalau kau takut... maka takutlah bersama aku. Aku tidak akan pergi.' <em>— Bab 13 selesai —</em></p>`,
        14: `<p>Debu masih memenuhi ruangan. Tiga sosok berjubah hitam berdiri di pintu reruntuhan. 'Subjek ditemukan. Eksekusi diizinkan.' Mereka menyerang. Kaien terpental. Rhen terluka. Archeon melihat semuanya. Sosok bertopeng mengangkat tangan. Rantai hitam muncul menuju Lyria. Archeon berlari mendorong Lyria. Rantai itu menghantam tubuh Archeon. <em>— Bab 14 selesai —</em></p>`,
        15: `<p>Ruangan mendadak sunyi. Selene berdiri dengan mata perak menyala. 'Aku bilang... jangan sentuh dia.' Waktu mulai retak. Archeon masih berlutut. Simbol hitam di telapak tangannya berdenyut lebih keras. Lalu garis hitam baru muncul naik sampai pergelangan tangan. Simbol kedua. Lebih tajam. Lebih gelap. <em>— Bab 15 selesai —</em></p>`,
        16: `<p>Ruangan reruntuhan masih dipenuhi debu. 'Master harus diberitahu.' Dari balik pohon, pria berjubah abu-abu muncul. 'Simbol kedua sudah bangkit.' Archeon menatap tajam. 'Siapa Master?' Pria itu diam sesaat. 'Azravel.' Nama itu membuat kepala Archeon berdenyut hebat. <em>— Bab 16 selesai —</em></p>`,
        17: `<p>Malam mulai turun saat mereka kembali ke Astera. Begitu Archeon melangkah masuk, beberapa orang langsung berhenti bicara. Bisikan mulai terdengar. 'Itu dia...' 'Anak tanpa mana itu...' 'Katanya monster di utara mati karenanya...' Seorang ibu menarik anaknya menjauh. Lyria berjalan lebih dekat ke Archeon. <em>— Bab 17 selesai —</em></p>`,
        18: `<p>Pagi di Astera terasa lebih sunyi. Archeon berdiri memegang pedang kayu. 'Aku tidak punya mana. Kalau begitu, aku harus punya sesuatu yang lain.' Beberapa jam berlalu. Keringat membasahi bajunya. Rhen mengangkat pedang. 'Cukup.' Archeon masih berdiri. 'Belum.' <em>— Bab 18 selesai —</em></p>`,
        19: `<p>Angin malam berhembus pelan. Tiba-tiba ledakan besar mengguncang Astera. Di langit, lingkaran hitam besar muncul. Puluhan makhluk bayangan jatuh ke jalan-jalan kota. Warga berteriak panik. Makhluk raksasa mendarat di tengah kota. Azravel menatap makhluk itu. 'Silent Order... sudah gila.' <em>— Bab 19 selesai —</em></p>`,
        20: `<p>Makhluk raksasa itu berdiri di tengah kota. 'Origin...' Makhluk itu menyerang. Rhen terpental. Kaien terlempar. Archeon jatuh berlutut. Lyria memeluknya. 'Archeon! Lihat aku!' Makhluk itu menyerang Lyria. Tanpa sadar, kata itu keluar: 'Berhenti.' Seluruh kota sunyi. Makhluk itu perlahan berlutut. 'Origin... telah kembali.' <em>— Bab 20 selesai —</em></p>`,
        21: `<p>Malam di Astera mendadak sunyi. Puluhan monster bayangan berlutut di hadapan Archeon. Tak bergerak. Tak menyerang. Mira menatap dengan bibir gemetar. 'Ini... bukan lagi kebetulan.' Rhen berdiri sambil menahan luka. 'Archeon.' Monster raksasa mengangkat kepala. 'Perintah.' <em>— Bab 21 selesai —</em></p>`,
        22: `<p>Malam di Astera belum berakhir. Orang-orang keluar dari tempat persembunyian. Mereka melihat Archeon. Bisikan mulai menyebar. 'Anak terkutuk...' 'Pembawa bencana...' 'Dia bukan manusia...' Lyria berdiri lebih dekat. Archeon melangkah menjauh. 'Mereka benar.' 'Aku sendiri sudah tidak tahu lagi.' <em>— Bab 22 selesai —</em></p>`,
        23: `<p>Mereka memutuskan meninggalkan Astera. Selene menunjuk ke timur. 'Kita harus ke sana.' Perjalanan melelahkan. Hutan semakin gelap. Tapi Archeon terus melangkah. Lyria tetap di sampingnya. Di kejauhan, bayangan hitam mulai mengikuti mereka. <em>— Bab 23 selesai —</em></p>`,
        24: `<p>Mereka sampai di sebuah desa kosong. Tidak ada suara. Tidak ada kehidupan. Hanya rumah-rumah kayu tua yang setengah rusak. Mira memeluk lengannya. 'Aku tidak suka ini.' Rhen menghunus pedang. 'Terlalu sepi.' Lyria menatap pintu-pintu rumah. 'Seperti semua orang pergi mendadak.' <em>— Bab 24 selesai —</em></p>`,
        25: `<p>Di tengah desa, patung raksasa berlutut. Seorang anak kecil bermata merah berdiri di depan rumah tua. 'Aku yang tertinggal.' Patung raksasa mengangkat kepala. 'Desa ini... telah menunggumu.' Pintu-pintu rumah terbuka. Bayangan manusia muncul. Seorang wanita tua berkata, 'Kami menunggumu...' Lalu hancur menjadi abu. Anak kecil itu berbisik, 'Jangan terlambat kali ini.' <em>— Bab 25 selesai —</em></p>`
    };

    const komikData = [
        {
            id: 1,
            title: "Archeon: The End Before Beginning",
            description: "Seorang anak yang lahir tanpa mana, tapi menyimpan kekuatan yang bahkan para dewa takut membangunkannya.",
            image: "archeonn.jpg",
            chapters: []
        }
    ];

    for (let i = 1; i <= 25; i++) {
        komikData[0].chapters.push({
            id: i,
            title: chapterJudul[i],
            content: chapterContents[i]
        });
    }

    // ==================== LOGIN SYSTEM ====================
    let currentUser = localStorage.getItem('currentUser') || null;

    function loadUsers() {
        const users = localStorage.getItem('users');
        if (users) return JSON.parse(users);
        const defaultUsers = { 'Varen': { password: 'farelgg1211', role: 'owner' } };
        saveUsers(defaultUsers);
        return defaultUsers;
    }

    function saveUsers(users) {
        localStorage.setItem('users', JSON.stringify(users));
    }

    function register(username, password, role = 'user') {
        const users = loadUsers();
        if (users[username]) return { success: false, message: 'Username sudah digunakan!' };
        if (username.length < 3) return { success: false, message: 'Username minimal 3 karakter!' };
        if (password.length < 4) return { success: false, message: 'Password minimal 4 karakter!' };
        
        users[username] = { password: password, role: role };
        saveUsers(users);
        return { success: true, message: 'Akun berhasil dibuat!' };
    }

    function login(username, password) {
        const users = loadUsers();
        const user = users[username];
        if (!user) return { success: false, message: 'Username tidak ditemukan!' };
        if (user.password !== password) return { success: false, message: 'Password salah!' };
        
        localStorage.setItem('currentUser', username);
        currentUser = username;
        updateUserDropdown();
        return { success: true, message: `Selamat datang, ${username}!` };
    }

    function logout() {
        localStorage.removeItem('currentUser');
        currentUser = null;
        updateUserDropdown();
        showHomePage();
    }

    function isOwner() {
        const users = loadUsers();
        return users[currentUser]?.role === 'owner';
    }

    function deleteUser(username) {
        if (username === 'Varen') return { success: false, message: 'Tidak bisa menghapus owner!' };
        const users = loadUsers();
        if (!users[username]) return { success: false, message: 'User tidak ditemukan!' };
        delete users[username];
        saveUsers(users);
        return { success: true, message: 'User berhasil dihapus!' };
    }

    // ==================== UI FUNCTIONS ====================
    function renderKomikGrid() {
        const grid = document.getElementById('komikGrid');
        if (!grid) return;
        
        grid.innerHTML = komikData.map(komik => `
            <div class="komik-card" onclick="selectKomik(${komik.id})">
                <div class="komik-image">
                    <img src="${komik.image}" alt="${komik.title}" onerror="this.src='https://placehold.co/300x200/2a2a2a/b87c4f?text=Archeon'">
                </div>
                <div class="komik-info">
                    <div class="komik-title">${komik.title}</div>
                    <div class="komik-desc">${komik.description}</div>
                </div>
            </div>
        `).join('');
    }

    window.selectKomik = function(komikId) {
        currentKomik = komikData.find(k => k.id === komikId);
        if (!currentKomik) return;
        document.getElementById('komikTitle').innerHTML = `📖 ${currentKomik.title}`;
        renderChapterList();
        showChaptersPage();
    }

    function renderChapterList() {
        const container = document.getElementById('chapter-list-container');
        if (!container || !currentKomik) return;
        
        container.innerHTML = currentKomik.chapters.map(ch => `
            <div class="chapter-card" onclick="openChapter(${ch.id})">
                <div class="chapter-num">Bab ${ch.id}</div>
                <div class="chapter-title">${ch.title}</div>
            </div>
        `).join('');
    }

    let currentKomik = null;
    let currentChapter = null;

    window.openChapter = function(chapterId) {
        currentChapter = currentKomik.chapters.find(ch => ch.id === chapterId);
        if (!currentChapter) return;
        
        const comments = loadComments(currentKomik.id, chapterId);
        
        let commentsHtml = '';
        if (comments.length > 0) {
            commentsHtml = comments.map(c => `
                <div class="comment">
                    <div class="comment-user">${c.user} ${getRoleBadge(c.user)}<span class="comment-date">${c.date}</span></div>
                    <div class="comment-text">${c.text}</div>
                </div>
            `).join('');
        } else {
            commentsHtml = '<p style="opacity:0.6;">Belum ada komentar. Jadilah yang pertama!</p>';
        }
        
        let commentInputHtml = '';
        if (currentUser) {
            commentInputHtml = `
                <div class="comment-input">
                    <textarea id="commentText" rows="2" placeholder="Tulis komentar..."></textarea>
                    <button id="submitCommentBtn">Kirim Komentar</button>
                </div>
            `;
        } else {
            commentInputHtml = `
                <div class="login-to-comment">
                    🔐 <a id="loginToCommentBtn">Login</a> untuk berkomentar
                </div>
            `;
        }
        
        const currentIndex = currentKomik.chapters.findIndex(ch => ch.id === chapterId);
        const prevChapter = currentIndex > 0 ? currentKomik.chapters[currentIndex - 1] : null;
        const nextChapter = currentIndex < currentKomik.chapters.length - 1 ? currentKomik.chapters[currentIndex + 1] : null;
        
        const readingContainer = document.getElementById('readingContainer');
        readingContainer.innerHTML = `
            <div class="reading-content">
                <div class="reading-title">Bab ${currentChapter.id} — ${currentChapter.title}</div>
                <div class="reading-text">${currentChapter.content}</div>
                <div class="nav-chapter">
                    <button id="prevChapterBtn" ${!prevChapter ? 'disabled' : ''}>← Bab Sebelumnya</button>
                    <button id="nextChapterBtn" ${!nextChapter ? 'disabled' : ''}>Bab Selanjutnya →</button>
                </div>
                <div class="comment-section">
                    <h4>💬 Komentar Pembaca (${comments.length})</h4>
                    <div id="commentsList">${commentsHtml}</div>
                    ${commentInputHtml}
                </div>
            </div>
        `;
        
        document.getElementById('prevChapterBtn')?.addEventListener('click', () => {
            if (prevChapter) openChapter(prevChapter.id);
        });
        document.getElementById('nextChapterBtn')?.addEventListener('click', () => {
            if (nextChapter) openChapter(nextChapter.id);
        });
        
        const submitBtn = document.getElementById('submitCommentBtn');
        if (submitBtn) {
            submitBtn.addEventListener('click', () => {
                const text = document.getElementById('commentText').value;
                if (addComment(currentKomik.id, chapterId, text)) {
                    document.getElementById('commentText').value = '';
                    openChapter(chapterId);
                }
            });
        }
        
        const loginToCommentBtn = document.getElementById('loginToCommentBtn');
        if (loginToCommentBtn) {
            loginToCommentBtn.addEventListener('click', () => openAuthModal('login'));
        }
        
        showReadingPage();
    }

    function getRoleBadge(username) {
        const users = loadUsers();
        const role = users[username]?.role;
        if (role === 'owner') return '<span class="writer-badge" style="background:#b87c4f;">👑 Owner</span>';
        if (role === 'writer') return '<span class="writer-badge">✍️ Penulis</span>';
        return '';
    }

    // ==================== KOMENTAR ====================
    function loadComments(komikId, chapterId) {
        const key = `comments_${komikId}_${chapterId}`;
        const comments = localStorage.getItem(key);
        return comments ? JSON.parse(comments) : [];
    }

    function saveComments(komikId, chapterId, comments) {
        const key = `comments_${komikId}_${chapterId}`;
        localStorage.setItem(key, JSON.stringify(comments));
    }

    function addComment(komikId, chapterId, text) {
        if (!currentUser || !text.trim()) return false;
        
        const comments = loadComments(komikId, chapterId);
        comments.push({
            id: Date.now(),
            user: currentUser,
            text: text.trim(),
            date: new Date().toLocaleString()
        });
        saveComments(komikId, chapterId, comments);
        return true;
    }

    // ==================== DASHBOARD ====================
    function renderDashboard() {
        if (!isOwner()) return;
        
        const users = loadUsers();
        const userList = Object.entries(users).map(([username, data]) => {
            let roleClass = '';
            let roleText = '';
            if (data.role === 'owner') { roleClass = 'role-owner'; roleText = '👑 Owner'; }
            else if (data.role === 'writer') { roleClass = 'role-writer'; roleText = '✍️ Penulis'; }
            else { roleClass = 'role-user'; roleText = '📖 Pembaca'; }
            
            return `
                <div class="user-item">
                    <span><strong>${username}</strong> <span class="${roleClass}">${roleText}</span></span>
                    ${username !== 'Varen' ? `<button class="delete-user-btn" onclick="deleteUserAccount('${username}')">Hapus</button>` : ''}
                </div>
            `;
        }).join('');
        
        document.getElementById('userListContainer').innerHTML = userList;
    }
    
    window.deleteUserAccount = function(username) {
        if (confirm(`Hapus user "${username}"?`)) {
            const result = deleteUser(username);
            alert(result.message);
            if (result.success) renderDashboard();
        }
    }
    
    document.getElementById('createWriterBtn')?.addEventListener('click', () => {
        const username = document.getElementById('newWriterUsername').value;
        const password = document.getElementById('newWriterPassword').value;
        const result = register(username, password, 'writer');
        document.getElementById('createWriterMessage').textContent = result.message;
        if (result.success) {
            document.getElementById('newWriterUsername').value = '';
            document.getElementById('newWriterPassword').value = '';
            renderDashboard();
        }
    });

    // ==================== PAGE NAVIGATION ====================
    function showHomePage() {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('home').classList.add('active');
    }

    function showChaptersPage() {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('chapters-page').classList.add('active');
    }

    function showReadingPage() {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('reading-page').classList.add('active');
    }

    function showDashboardPage() {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('dashboard-page').classList.add('active');
        renderDashboard();
    }

    // ==================== MODAL AUTH ====================
    function openAuthModal(tab = 'login') {
        const modal = document.getElementById('authModal');
        const container = document.getElementById('modalFormContainer');
        
        const loginForm = `
            <h3>🔐 LOGIN</h3>
            <input type="text" id="loginUsername" placeholder="Username">
            <input type="password" id="loginPassword" placeholder="Password">
            <button id="doLoginBtn">Login</button>
            <div class="auth-switch">Belum punya akun? <a id="toRegister">Daftar di sini</a></div>
            <div id="loginMessage" class="auth-message"></div>
        `;
        
        const registerForm = `
            <h3>📝 DAFTAR AKUN</h3>
            <input type="text" id="regUsername" placeholder="Username (min 3)">
            <input type="password" id="regPassword" placeholder="Password (min 4)">
            <button id="doRegisterBtn">Daftar</button>
            <div class="auth-switch">Sudah punya akun? <a id="toLogin">Login di sini</a></div>
            <div id="registerMessage" class="auth-message"></div>
        `;
        
        container.innerHTML = tab === 'login' ? loginForm : registerForm;
        modal.classList.add('active');
        
        if (tab === 'login') {
            document.getElementById('doLoginBtn')?.addEventListener('click', () => {
                const username = document.getElementById('loginUsername').value;
                const password = document.getElementById('loginPassword').value;
                const result = login(username, password);
                const msg = document.getElementById('loginMessage');
                msg.textContent = result.message;
                if (result.success) {
                    setTimeout(() => {
                        modal.classList.remove('active');
                        location.reload();
                    }, 1000);
                }
            });
            document.getElementById('toRegister')?.addEventListener('click', (e) => {
                e.preventDefault();
                openAuthModal('register');
            });
        } else {
            document.getElementById('doRegisterBtn')?.addEventListener('click', () => {
                const username = document.getElementById('regUsername').value;
                const password = document.getElementById('regPassword').value;
                const result = register(username, password, 'user');
                const msg = document.getElementById('registerMessage');
                msg.textContent = result.message;
                if (result.success) {
                    setTimeout(() => openAuthModal('login'), 1500);
                }
            });
            document.getElementById('toLogin')?.addEventListener('click', (e) => {
                e.preventDefault();
                openAuthModal('login');
            });
        }
    }

    function updateUserDropdown() {
        const dropdown = document.getElementById('dropdownContent');
        if (!dropdown) return;
        if (currentUser) {
            const isOwnerUser = isOwner();
            dropdown.innerHTML = `<a class="user-name">👤 ${currentUser}</a>${isOwnerUser ? '<a id="dropdownDashboard">📊 Dashboard Owner</a>' : ''}<a id="dropdownLogout">🚪 Logout</a>`;
            document.getElementById('dropdownLogout')?.addEventListener('click', logout);
            document.getElementById('dropdownDashboard')?.addEventListener('click', showDashboardPage);
        } else {
            dropdown.innerHTML = `<a id="dropdownLogin">🔐 Login / Daftar</a>`;
            document.getElementById('dropdownLogin')?.addEventListener('click', () => openAuthModal('login'));
        }
    }

    // ==================== DARK MODE ====================
    function initTheme() {
        const theme = localStorage.getItem('theme') || 'light';
        if (theme === 'dark') document.body.classList.add('dark');
        const btn = document.getElementById('themeToggle');
        btn.textContent = theme === 'dark' ? '☀️' : '🌙';
        btn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            btn.textContent = isDark ? '☀️' : '🌙';
        });
    }

    // ==================== INIT ====================
    function init() {
        renderKomikGrid();
        
        document.getElementById('backToHomeBtn')?.addEventListener('click', showHomePage);
        document.getElementById('backToChaptersBtn')?.addEventListener('click', showChaptersPage);
        document.getElementById('backToHomeFromDashboardBtn')?.addEventListener('click', showHomePage);
        
        const accountBtn = document.getElementById('accountBtn');
        const dropdown = document.getElementById('userDropdown');
        accountBtn?.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('active');
        });
        document.addEventListener('click', () => {
            dropdown.classList.remove('active');
        });
        
        const modal = document.getElementById('authModal');
        modal?.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });
        
        updateUserDropdown();
        initTheme();
    }
    
    init();
</script>
</body>
</html>
