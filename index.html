<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <titleArcheon</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<header>
  <h1>Archeon Novel</h1>
  <div id="userBox"></div>
</header>

<section class="auth-box">
  <h2>Login / Register</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <div class="button-row">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>
</section>

<section class="form-box">
  <h2>Tambah Novel</h2>
  <input type="text" id="novelTitle" placeholder="Judul novel">
  <textarea id="novelDesc" placeholder="Deskripsi novel"></textarea>
  <input type="file" id="coverFile">
  <button onclick="addNovel()">Simpan Novel</button>
</section>

<section>
  <h2>Daftar Novel</h2>
  <div id="novelList" class="novel-list"></div>
</section>

<section class="form-box">
  <h2>Tambah Chapter</h2>
  <input type="text" id="chapterTitle" placeholder="Judul chapter">
  <textarea id="chapterContent" placeholder="Isi chapter"></textarea>
  <button onclick="addChapter()">Simpan Chapter</button>
</section>

<section>
  <h2>Daftar Chapter</h2>
  <div id="chapterList"></div>
</section>

<section class="form-box">
  <h2>Komentar</h2>
  <textarea id="commentText" placeholder="Tulis komentar..."></textarea>
  <button onclick="addComment()">Kirim Komentar</button>
  <div id="commentList"></div>
</section>

<script src="js/app.js"></script>
</body>
</html>
