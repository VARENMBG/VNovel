<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Archeon Novel Platform</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
    font-family:Arial,sans-serif;
    background:#111;
    color:#fff;
    margin:0;
    padding:20px;
}
h1,h2{
    text-align:center;
}
.container{
    max-width:800px;
    margin:auto;
}
input,textarea,button{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}
input,textarea{
    background:#222;
    color:#fff;
}
button{
    background:#6c3cff;
    color:#fff;
    cursor:pointer;
}
button:hover{
    opacity:0.9;
}
.card{
    background:#1e1e1e;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
}
.card img{
    width:120px;
    border-radius:8px;
}
.hidden{
    display:none;
}
small{
    color:#aaa;
}
</style>
</head>
<body>

<div class="container">

<h1>Archeon Novel Platform</h1>

<div id="authBox">
<h2>Login / Register</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div id="userBox" class="hidden">
<p id="userInfo"></p>
<button onclick="logout()">Logout</button>
</div>

<div id="novelForm" class="hidden">
<h2>Tambah Novel</h2>
<input type="text" id="novelTitle" placeholder="Judul Novel">
<textarea id="novelDesc" placeholder="Deskripsi Novel"></textarea>
<input type="file" id="coverFile">
<button onclick="addNovel()">Simpan Novel</button>
</div>

<h2>Daftar Novel</h2>
<div id="novelList"></div>

</div>

<script>
const SUPABASE_URL = "https://lyhqlhqrazxhjpxxllqg.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5aHFsaHFyYXp4aGpweHhsbHFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NTk0NTMsImV4cCI6MjA5MjEzNTQ1M30.r4PXoKM15VBItcKH7VhmabzwwXPSVy9uN3nGB8b9rCQ";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentProfile = null;

async function register(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabaseClient.auth.signUp({
        email,
        password
    });

    if(error){
        alert(error.message);
    }else{
        alert("Register berhasil. Silakan login.");
    }
}

async function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
    });

    if(error){
        alert(error.message);
        return;
    }

    currentUser = data.user;
    await loadProfile();
}

async function logout(){
    await supabaseClient.auth.signOut();
    location.reload();
}

async function loadProfile(){
    const { data } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .single();

    currentProfile = data;

    document.getElementById("authBox").classList.add("hidden");
    document.getElementById("userBox").classList.remove("hidden");
    document.getElementById("userInfo").innerText =
        `Login sebagai ${data.username} (${data.role})`;

    if(["writer","admin","developer"].includes(data.role)){
        document.getElementById("novelForm").classList.remove("hidden");
    }

    loadNovels();
}

async function uploadCover(file){
    const fileName = Date.now() + "_" + file.name;

    const { error } = await supabaseClient.storage
        .from("novel-covers")
        .upload(fileName, file);

    if(error){
        alert(error.message);
        return null;
    }

    const { data } = supabaseClient.storage
        .from("novel-covers")
        .getPublicUrl(fileName);

    return data.publicUrl;
}

async function addNovel(){
    const title = document.getElementById("novelTitle").value;
    const description = document.getElementById("novelDesc").value;
    const file = document.getElementById("coverFile").files[0];

    let cover_url = null;

    if(file){
        cover_url = await uploadCover(file);
    }

    const { error } = await supabaseClient
        .from("novels")
        .insert([{
            title,
            description,
            cover_url,
            author_id: currentUser.id
        }]);

    if(error){
        alert(error.message);
        return;
    }

    alert("Novel berhasil ditambahkan");
    document.getElementById("novelTitle").value = "";
    document.getElementById("novelDesc").value = "";
    document.getElementById("coverFile").value = "";
    loadNovels();
}

async function loadNovels(){
    const { data, error } = await supabaseClient
        .from("novels")
        .select("*")
        .eq("deleted", false)
        .order("created_at", { ascending:false });

    const list = document.getElementById("novelList");
    list.innerHTML = "";

    if(error){
        list.innerHTML = "<p>Gagal memuat novel</p>";
        return;
    }

    data.forEach(novel=>{
        list.innerHTML += `
        <div class="card">
            ${novel.cover_url ? `<img src="${novel.cover_url}" alt="">` : ""}
            <h3>${novel.title}</h3>
            <p>${novel.description || ""}</p>
            <small>Status: ${novel.status || "ongoing"}</small><br>
            <small>Views: ${novel.views || 0}</small>
        </div>
        `;
    });
}

async function checkSession(){
    const { data } = await supabaseClient.auth.getUser();

    if(data.user){
        currentUser = data.user;
        await loadProfile();
    }else{
        loadNovels();
    }
}

checkSession();
</script>

</body>
</html>
